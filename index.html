<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BANTER QUIZ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0a1a;--card:#1a1230;--card2:#241a40;--accent:#7c5cff;--accent-dim:#5a3fd4;--accent-glow:rgba(124,92,255,.3);--text:#f0eaff;--text-dim:#8a7aaa;--green:#7ed957;--red:#ff4d4d;--orange:#ffb347;--gold:#ffd700;--border:#3a2a60;--depth-dark:#0a0612;--depth-mid:#120e22;--iso-shadow-sm:3px 3px 0 var(--depth-dark);--iso-shadow-md:4px 4px 0 var(--depth-dark),5px 5px 0 rgba(0,0,0,.3);--iso-shadow-lg:4px 4px 0 var(--depth-dark),6px 6px 0 rgba(0,0,0,.35),8px 8px 0 rgba(0,0,0,.15);--ans-blue:#3b82f6;--ans-red:#ef4444;--ans-green:#22c55e;--ans-orange:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Fredoka',sans-serif;background:linear-gradient(170deg,var(--bg) 0%,#060412 100%);color:var(--text);min-height:100vh;overflow-x:hidden;background-image:linear-gradient(45deg,rgba(124,92,255,.015) 25%,transparent 25%),linear-gradient(-45deg,rgba(124,92,255,.015) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,rgba(124,92,255,.015) 75%),linear-gradient(-45deg,transparent 75%,rgba(124,92,255,.015) 75%);background-size:40px 40px;background-position:0 0,0 20px,20px -20px,-20px 0}
#app{max-width:1200px;margin:0 auto;position:relative;min-height:100vh;padding:20px 40px}

/* ===== AUTH ===== */
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.auth-inner{max-width:380px;width:100%}
.auth-logo{font-size:72px;animation:logoFloat 3s ease-in-out infinite;display:block;margin-bottom:8px;filter:drop-shadow(0 4px 20px var(--accent-glow))}
@keyframes logoFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
.game-title{font-size:34px;font-weight:800;color:var(--accent);letter-spacing:4px;text-shadow:0 0 30px var(--accent-glow),0 3px 0 var(--depth-dark)}
.subtitle{color:var(--text-dim);font-size:14px;margin-top:6px;font-weight:500}
.auth-form{margin-top:24px;text-align:left}
.field-label{display:block;font-size:13px;color:var(--text-dim);margin-bottom:6px;margin-top:14px}
.field-input{width:100%;padding:13px 16px;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:16px;font-family:'Fredoka',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 16px var(--accent-glow)}
.btn-primary{width:100%;padding:14px 0;margin-top:18px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),#5a3fd4);color:white;font-size:16px;font-weight:800;font-family:'Fredoka',sans-serif;cursor:pointer;letter-spacing:2px;text-transform:uppercase;box-shadow:0 5px 0 var(--depth-dark),0 8px 20px var(--accent-glow);transition:all .1s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 7px 0 var(--depth-dark),0 10px 24px var(--accent-glow)}
.btn-primary:active{transform:translateY(3px);box-shadow:0 1px 0 var(--depth-dark)}
.btn-primary:disabled{opacity:.4;cursor:default;transform:none}
.auth-toggle{color:var(--accent);cursor:pointer;background:none;border:none;font-family:'Fredoka',sans-serif;font-size:14px;margin-top:14px;text-decoration:underline;display:block;text-align:center;width:100%}
.auth-error{color:var(--red);font-size:13px;margin-top:10px;text-align:center;padding:8px;background:rgba(255,87,87,.1);border-radius:8px}
.fb-status{margin-top:14px;font-size:12px;padding:6px 10px;border-radius:6px}
.fb-status.ok{background:rgba(76,223,122,.15);color:var(--green)}
.fb-status.bad{background:rgba(255,87,87,.15);color:var(--red)}

/* ===== AVATAR SELECT ===== */
.avatar-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:16px}
.avatar-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-width:380px}
.avatar-opt{width:60px;height:60px;border-radius:50%;border:3px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;box-shadow:var(--iso-shadow-sm);border-bottom:4px solid var(--depth-dark);overflow:hidden;padding:0}
.avatar-opt img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.avatar-opt:hover{transform:translateY(-3px);box-shadow:var(--iso-shadow-md);border-color:var(--accent-dim)}
.avatar-opt.selected{border-color:var(--accent);background:rgba(124,92,255,.15);box-shadow:0 0 16px var(--accent-glow),var(--iso-shadow-sm)}

/* ===== MENU ===== */
.menu-screen{padding:20px 16px;display:flex;flex-direction:column;gap:14px}
.menu-header{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);border:1px solid var(--border);border-bottom:3px solid var(--depth-dark);border-radius:14px;box-shadow:var(--iso-shadow-sm)}
.menu-avatar{width:50px;height:50px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;background:var(--card2);overflow:hidden}
.menu-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.menu-info{flex:1}
.menu-name{font-size:16px;font-weight:800}
.menu-coins{font-size:13px;color:var(--gold);font-family:'JetBrains Mono',monospace}
.menu-title{text-align:center;font-size:28px;font-weight:800;color:var(--accent);letter-spacing:3px;text-shadow:0 0 20px var(--accent-glow),0 3px 0 var(--depth-dark);margin:10px 0}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.menu-btn{padding:24px 14px;border:2px solid var(--border);border-bottom:5px solid var(--depth-dark);border-radius:16px;background:var(--card);color:var(--text);cursor:pointer;font-family:'Fredoka',sans-serif;font-size:14px;font-weight:700;text-align:center;transition:all .12s;box-shadow:var(--iso-shadow-md);display:flex;flex-direction:column;align-items:center;gap:6px}
.menu-btn:hover{transform:translateY(-3px);box-shadow:var(--iso-shadow-lg);border-color:var(--accent-dim)}
.menu-btn:active{transform:translateY(2px);box-shadow:var(--iso-shadow-sm)}
.menu-btn .btn-icon{font-size:32px}
.menu-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px}
.menu-stat{background:var(--card);border:1px solid var(--border);border-bottom:3px solid var(--depth-dark);border-radius:10px;padding:10px 8px;text-align:center;box-shadow:var(--iso-shadow-sm)}
.menu-stat .sv{font-size:16px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace}
.menu-stat .sl{font-size:9px;color:var(--text-dim);margin-top:2px}

/* ===== LOBBY ===== */
.lobby-screen{padding:24px 40px;display:flex;flex-direction:column;gap:16px;max-width:900px;margin:0 auto;width:100%}
.lobby-code-box{text-align:center;padding:20px;background:var(--card);border:2px solid var(--accent);border-bottom:5px solid var(--depth-dark);border-radius:16px;box-shadow:var(--iso-shadow-lg)}
.lobby-code-label{font-size:12px;color:var(--text-dim);margin-bottom:4px}
.lobby-code{font-size:42px;font-weight:800;color:var(--accent);letter-spacing:8px;font-family:'JetBrains Mono',monospace;text-shadow:0 0 20px var(--accent-glow)}
.lobby-players-title{font-size:14px;font-weight:700;color:var(--text-dim)}
.lobby-players{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.lobby-player{padding:12px 8px;background:var(--card);border:1px solid var(--border);border-bottom:3px solid var(--depth-dark);border-radius:12px;text-align:center;box-shadow:var(--iso-shadow-sm);animation:playerJoin .3s ease-out}
@keyframes playerJoin{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
.lobby-player .lp-avatar{font-size:28px;display:flex;justify-content:center}
.lobby-player .lp-name{font-size:11px;font-weight:600;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lobby-player.host{border-color:var(--gold);background:rgba(255,215,0,.06)}
.lobby-player.host .lp-name{color:var(--gold)}
.lobby-empty{padding:12px 8px;background:var(--card);border:1px dashed var(--border);border-radius:12px;text-align:center;opacity:.3;font-size:11px;color:var(--text-dim)}
.lobby-btns{display:flex;gap:10px}
.lobby-btns .btn-primary{flex:1}
.btn-danger{width:100%;padding:12px 0;border:2px solid var(--red);border-bottom:4px solid #991a1a;border-radius:12px;background:rgba(255,77,77,.1);color:var(--red);font-size:14px;font-weight:700;font-family:'Fredoka',sans-serif;cursor:pointer;transition:all .1s;box-shadow:var(--iso-shadow-sm);flex:1}
.btn-danger:hover{background:rgba(255,77,77,.2);transform:translateY(-2px)}
.btn-danger:active{transform:translateY(2px);box-shadow:1px 1px 0 var(--depth-dark)}

/* ===== JOIN MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:2px solid var(--accent);border-bottom:5px solid var(--depth-dark);border-radius:20px;padding:28px;max-width:360px;width:100%;text-align:center;animation:modalPop .3s ease-out;box-shadow:var(--iso-shadow-lg)}
@keyframes modalPop{0%{transform:scale(.7) perspective(600px) rotateX(8deg);opacity:0}60%{transform:scale(1.02);opacity:1}100%{transform:scale(1);opacity:1}}
.modal h2{color:var(--accent);font-size:20px;margin-bottom:12px}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer}

/* ===== GAME ===== */
.game-screen{padding:24px 40px 100px 80px;display:flex;flex-direction:column;gap:14px;max-width:960px;margin:0 auto;width:100%;animation:phaseIn .35s ease-out}
@keyframes phaseIn{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
.game-header{display:flex;justify-content:space-between;align-items:center}
.game-round{font-size:13px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.game-category{font-size:14px;font-weight:700;color:var(--accent)}
.timer-bar-wrap{width:100%;height:8px;background:var(--card);border-radius:4px;border:1px solid var(--border);border-bottom:2px solid var(--depth-dark);overflow:hidden;box-shadow:var(--iso-shadow-sm)}
.timer-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:4px;transition:width .5s linear}
.timer-bar-fill.urgent{background:linear-gradient(90deg,var(--red),var(--orange))}
.question-card{background:var(--card);border:2px solid var(--border);border-bottom:5px solid var(--depth-dark);border-radius:16px;padding:28px 36px;text-align:center;box-shadow:var(--iso-shadow-md);min-height:120px;display:flex;align-items:center;justify-content:center;position:relative;font-size:18px}
.question-text{font-size:18px;font-weight:700;line-height:1.4}
.question-points{position:absolute;top:10px;right:12px;font-size:11px;padding:4px 8px;border-radius:8px;font-weight:700;font-family:'JetBrains Mono',monospace}
.question-points.pts1{background:rgba(124,92,255,.15);color:var(--accent)}
.question-points.pts5{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.answer-btn{padding:20px 16px;border:2px solid transparent;border-bottom:5px solid rgba(0,0,0,.3);border-radius:14px;color:white;font-size:16px;font-weight:700;font-family:'Fredoka',sans-serif;cursor:pointer;transition:all .1s;box-shadow:var(--iso-shadow-sm);text-align:center;min-height:70px;display:flex;align-items:center;justify-content:center;gap:6px}
.answer-btn:nth-child(1){background:var(--ans-blue)}
.answer-btn:nth-child(2){background:var(--ans-red)}
.answer-btn:nth-child(3){background:var(--ans-green)}
.answer-btn:nth-child(4){background:var(--ans-orange)}
.answer-btn:hover:not(.locked):not(.disabled){transform:translateY(-2px);box-shadow:var(--iso-shadow-md)}
.answer-btn:active:not(.locked):not(.disabled){transform:translateY(3px);box-shadow:1px 1px 0 var(--depth-dark)}
.answer-btn.selected{border-color:white;box-shadow:0 0 16px rgba(255,255,255,.3),var(--iso-shadow-sm)}
.answer-btn.correct{border-color:var(--green)!important;box-shadow:0 0 20px rgba(126,217,87,.4)!important}
.answer-btn.wrong{opacity:.4;border-color:transparent!important}
.answer-btn.locked{cursor:default;opacity:.7}
.answer-btn.disabled{cursor:default;opacity:.5}
.timer-text{text-align:center;font-size:28px;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace}

/* ===== SILHOUETTE ===== */
.sil-card{background:var(--card);border:2px solid var(--gold);border-bottom:5px solid rgba(255,215,0,.4);border-radius:16px;padding:20px;text-align:center;box-shadow:0 0 20px rgba(255,215,0,.15),var(--iso-shadow-md);position:relative;display:flex;flex-direction:column;align-items:center;gap:10px}
.sil-label{font-size:20px;font-weight:800;color:var(--gold)}
.sil-img{width:220px;height:280px;object-fit:cover;border-radius:12px;filter:blur(12px) brightness(0.15) saturate(0);transition:filter .6s ease}
.sil-img.revealed{filter:none}
.sil-card.revealed{border-color:var(--green)}
.answers-grid-10{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.answers-grid-10 .answer-btn{padding:12px 8px;font-size:13px;min-height:50px}
.answers-grid-10 .answer-btn:nth-child(5){background:#8b5cf6}
.answers-grid-10 .answer-btn:nth-child(6){background:#0ea5e9}
.answers-grid-10 .answer-btn:nth-child(7){background:#ec4899}
.answers-grid-10 .answer-btn:nth-child(8){background:#14b8a6}
.answers-grid-10 .answer-btn:nth-child(9){background:#f97316}
.answers-grid-10 .answer-btn:nth-child(10){background:#6366f1}

/* ===== CATEGORY PICK ===== */
.category-pick{display:flex;flex-direction:column;gap:12px;align-items:center}
.pick-title{font-size:16px;font-weight:700;text-align:center}
.pick-sub{font-size:13px;color:var(--text-dim);text-align:center}
.category-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%}
.cat-btn{padding:20px 14px;border:2px solid var(--border);border-bottom:5px solid var(--depth-dark);border-radius:14px;background:var(--card);color:var(--text);cursor:pointer;font-family:'Fredoka',sans-serif;font-size:15px;font-weight:700;transition:all .12s;box-shadow:var(--iso-shadow-sm);display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.cat-btn:hover:not(:disabled){transform:translateY(-3px);box-shadow:var(--iso-shadow-md)}
.cat-btn:active:not(:disabled){transform:translateY(2px);box-shadow:1px 1px 0 var(--depth-dark)}
.cat-btn:disabled{opacity:.3;cursor:default}
.cat-btn .cat-icon{font-size:24px}
.cat-btn .cat-name{font-size:11px}

/* ===== SCOREBOARD (IN-GAME) ===== */
.player-bar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:6px;padding:10px 16px;background:linear-gradient(180deg,transparent 0%,rgba(20,16,36,.95) 30%);z-index:50;flex-wrap:wrap}
.pb-player{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:70px;max-width:90px;position:relative}
.pb-avatar-wrap{position:relative;width:44px;height:44px}
.pb-avatar-wrap img,.pb-avatar-wrap span{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);display:block}
.pb-player.me .pb-avatar-wrap img,.pb-player.me .pb-avatar-wrap span{border-color:var(--accent)}
.pb-player.answered .pb-avatar-wrap::after{content:'✓';position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;background:var(--green);border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;border:2px solid var(--bg)}
.pb-player.picking .pb-avatar-wrap{animation:pickPulse 1s infinite}
@keyframes pickPulse{0%,100%{box-shadow:0 0 0 0 rgba(124,92,255,.5)}50%{box-shadow:0 0 0 8px rgba(124,92,255,0)}}
.pb-name{font-size:10px;font-weight:600;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.pb-score{font-size:11px;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace}
.pb-streak{position:absolute;top:-6px;right:-6px;background:var(--gold);color:#1a1625;font-size:9px;font-weight:800;padding:1px 5px;border-radius:10px;font-family:'JetBrains Mono',monospace}
.pb-emote{position:absolute;top:-40px;left:50%;transform:translateX(-50%);font-size:28px;animation:emotePopUp 1.8s ease-out forwards;pointer-events:none;z-index:100}
@keyframes emotePopUp{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}60%{opacity:1;transform:translateX(-50%) translateY(-30px) scale(1.2)}100%{opacity:0;transform:translateX(-50%) translateY(-60px) scale(0.5)}}
.pb-speed{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:800;color:var(--gold);animation:speedPop 1.5s ease-out forwards;pointer-events:none;white-space:nowrap}
@keyframes speedPop{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-20px)}}

/* ===== RESULTS ===== */
.results-screen{padding:20px 16px;display:flex;flex-direction:column;gap:14px;align-items:center}
.results-title{font-size:26px;font-weight:800;color:var(--accent);text-shadow:0 0 20px var(--accent-glow),0 3px 0 var(--depth-dark)}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin:10px 0}
.podium-spot{display:flex;flex-direction:column;align-items:center;text-align:center;padding:12px 10px;background:var(--card);border:2px solid var(--border);border-bottom:5px solid var(--depth-dark);border-radius:14px;box-shadow:var(--iso-shadow-md);min-width:90px}
.podium-spot.first{border-color:var(--gold);background:rgba(255,215,0,.06);transform:translateY(-10px)}
.podium-spot.second{border-color:#c0c0c0}
.podium-spot.third{border-color:#cd7f32}
.podium-medal{font-size:28px}
.podium-avatar{font-size:32px;margin:4px 0;display:flex;justify-content:center}
.podium-name{font-size:12px;font-weight:700;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.podium-score{font-size:16px;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace}
.results-list{width:100%;display:flex;flex-direction:column;gap:6px}
.result-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-bottom:3px solid var(--depth-dark);border-radius:12px;box-shadow:var(--iso-shadow-sm)}
.result-row.me{border-color:var(--accent);background:rgba(124,92,255,.06)}
.rr-rank{font-size:14px;font-weight:800;color:var(--text-dim);width:24px;text-align:center}
.rr-avatar{font-size:22px}
.rr-info{flex:1}
.rr-name{font-size:13px;font-weight:700}
.rr-detail{font-size:10px;color:var(--text-dim)}
.rr-score{text-align:right}
.rr-pts{font-size:16px;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace}
.rr-coins{font-size:10px;color:var(--gold)}
.results-btns{display:flex;gap:10px;width:100%}
.results-btns .btn-primary,.results-btns .btn-danger{flex:1}

/* ===== SHOP ===== */
.shop-tabs{display:flex;gap:2px;margin-bottom:12px}
.shop-tab{flex:1;padding:10px;border:none;border-bottom:3px solid transparent;background:var(--card);color:var(--text-dim);font-family:'Fredoka',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-radius:8px 8px 0 0;transition:all .15s}
.shop-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--card2)}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.shop-item{padding:14px 10px;background:var(--card);border:1px solid var(--border);border-bottom:3px solid var(--depth-dark);border-radius:12px;text-align:center;cursor:pointer;transition:all .12s;box-shadow:var(--iso-shadow-sm)}
.shop-item:hover:not(.owned){transform:translateY(-2px);box-shadow:var(--iso-shadow-md);border-color:var(--accent-dim)}
.shop-item.owned{border-color:var(--green);opacity:.7}
.shop-item .si-icon{font-size:28px;margin-bottom:4px}
.shop-item .si-name{font-size:12px;font-weight:700}
.shop-item .si-price{font-size:11px;color:var(--gold);font-family:'JetBrains Mono',monospace;margin-top:4px}
.shop-item.owned .si-price{color:var(--green)}
.shop-coins{font-size:14px;color:var(--gold);font-family:'JetBrains Mono',monospace;text-align:center;margin-bottom:10px}

/* ===== LEFT SIDEBAR ===== */
.game-sidebar{position:fixed;left:0;top:50%;transform:translateY(-50%);width:60px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;background:rgba(26,18,48,.9);border-right:2px solid var(--border);border-radius:0 16px 16px 0;z-index:80;box-shadow:var(--iso-shadow-md);max-height:80vh;overflow-y:auto}
.sidebar-label{font-size:8px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.sidebar-divider{width:36px;height:1px;background:var(--border);margin:4px 0}
.sidebar-btn{width:42px;height:42px;border-radius:10px;border:1px solid var(--border);background:var(--card2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;box-shadow:0 2px 0 var(--depth-dark);color:var(--text);position:relative}
.sidebar-btn:hover{transform:translateY(-2px);box-shadow:0 4px 0 var(--depth-dark);border-color:var(--accent-dim)}
.sidebar-btn:active{transform:translateY(1px);box-shadow:0 1px 0 var(--depth-dark)}
.sidebar-btn.power-up{border-color:var(--gold);background:rgba(255,215,0,.08)}
.sidebar-btn.power-up:hover{background:rgba(255,215,0,.15)}
.sidebar-btn.power-up.used{opacity:.3;cursor:default;pointer-events:none}
.sidebar-btn .cooldown-ring{position:absolute;inset:0;border-radius:10px;border:2px solid var(--red);opacity:0;animation:cooldownFade 3s forwards}
@keyframes cooldownFade{0%{opacity:.6}100%{opacity:0}}

/* ===== SCREEN FLASH ===== */
.screen-flash{position:fixed;inset:0;pointer-events:none;z-index:200;animation:flashPulse .4s ease-out forwards}
.screen-flash.correct{background:radial-gradient(circle,rgba(126,217,87,.25),transparent 70%)}
.screen-flash.wrong{background:radial-gradient(circle,rgba(255,77,77,.25),transparent 70%)}
@keyframes flashPulse{0%{opacity:1}100%{opacity:0}}

/* ===== PLAYER REACTIONS ===== */
.pb-player.react-correct .pb-avatar-wrap{animation:avatarBounce .5s ease}
.pb-player.react-wrong .pb-avatar-wrap{animation:avatarShake .4s ease}
@keyframes avatarBounce{0%{transform:translateY(0)}30%{transform:translateY(-12px) scale(1.15)}60%{transform:translateY(-4px)}100%{transform:translateY(0)}}
@keyframes avatarShake{0%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-3px)}100%{transform:translateX(0)}}

/* ===== WAITING TEXT ===== */
.waiting-box{text-align:center;padding:30px;color:var(--text-dim);font-size:14px}
.waiting-box .waiting-icon{font-size:48px;margin-bottom:10px;animation:logoFloat 2s ease-in-out infinite}
.waiting-dots::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

/* ===== CONFETTI ===== */
.confetti{position:fixed;pointer-events:none;z-index:999;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* ===== TOAST ===== */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;background:var(--card);border:2px solid var(--accent);border-bottom:4px solid var(--depth-dark);border-radius:12px;z-index:999;animation:toastSlide 3s ease-in-out forwards;font-size:14px;font-weight:700;color:var(--accent);box-shadow:var(--iso-shadow-md);text-align:center;max-width:90%}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
@keyframes toastSlide{0%{transform:translateX(-50%) translateY(-60px);opacity:0}10%{transform:translateX(-50%) translateY(0);opacity:1}85%{transform:translateX(-50%) translateY(0);opacity:1}100%{transform:translateX(-50%) translateY(-60px);opacity:0}}

/* ===== LOBBY CHAT ===== */
.lobby-chat{background:var(--card);border:2px solid var(--border);border-bottom:4px solid var(--depth-dark);border-radius:14px;padding:12px;box-shadow:var(--iso-shadow-sm);max-height:200px;display:flex;flex-direction:column}
.chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;max-height:130px;margin-bottom:8px;scroll-behavior:smooth}
.chat-msg{font-size:12px;line-height:1.3;padding:2px 0}
.chat-msg .chat-name{font-weight:700;color:var(--accent);margin-right:4px}
.chat-msg .chat-text{color:var(--text)}
.chat-msg.system{color:var(--text-dim);font-style:italic;font-size:11px}
.chat-input-row{display:flex;gap:6px}
.chat-input-row input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-family:'Fredoka',sans-serif;font-size:12px;outline:none}
.chat-input-row input:focus{border-color:var(--accent)}
.chat-input-row button{padding:6px 12px;border:none;border-radius:8px;background:var(--accent);color:white;font-family:'Fredoka',sans-serif;font-size:12px;font-weight:700;cursor:pointer}

/* ===== TAUNTS ===== */
.taunt-popup{position:fixed;top:30%;left:50%;transform:translateX(-50%);background:var(--card);border:2px solid var(--accent);border-bottom:5px solid var(--depth-dark);border-radius:16px;padding:16px 28px;z-index:300;animation:tauntIn .4s ease-out forwards;box-shadow:var(--iso-shadow-lg);text-align:center;max-width:400px}
.taunt-popup .taunt-from{font-size:12px;color:var(--text-dim);margin-bottom:4px}
.taunt-popup .taunt-text{font-size:20px;font-weight:800;color:var(--accent)}
@keyframes tauntIn{0%{opacity:0;transform:translateX(-50%) scale(0.5) rotate(-5deg)}50%{transform:translateX(-50%) scale(1.1) rotate(2deg)}100%{opacity:1;transform:translateX(-50%) scale(1) rotate(0deg)}}

/* ===== DRUMROLL ===== */
.drumroll-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:250;display:flex;align-items:center;justify-content:center}
.drumroll-text{font-size:64px;font-weight:800;color:var(--gold);text-shadow:0 0 40px rgba(255,215,0,.5),0 4px 0 var(--depth-dark);animation:drumPulse .5s ease-in-out infinite alternate}
@keyframes drumPulse{0%{transform:scale(0.9)}100%{transform:scale(1.1)}}

/* ===== REACTION CAM ===== */
.reaction-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:280;display:flex;flex-direction:column;gap:8px;animation:reactionSlide .5s ease-out;pointer-events:none}
.reaction-row{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--card);border:2px solid var(--border);border-radius:12px;box-shadow:var(--iso-shadow-md);animation:reactionFade 2.5s ease-out forwards;white-space:nowrap}
.reaction-row.correct-r{border-color:var(--green)}
.reaction-row.wrong-r{border-color:var(--red)}
.reaction-row .r-avatar{width:28px;height:28px}
.reaction-row .r-name{font-weight:700;font-size:13px}
.reaction-row .r-text{font-size:12px;font-style:italic;color:var(--text-dim)}
@keyframes reactionSlide{0%{opacity:0;transform:translate(-50%,-50%) translateY(30px)}100%{opacity:1;transform:translate(-50%,-50%) translateY(0)}}
@keyframes reactionFade{0%,70%{opacity:1}100%{opacity:0}}

/* ===== MVP AWARDS ===== */
.mvp-section{width:100%;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.mvp-card{background:var(--card);border:2px solid var(--gold);border-bottom:4px solid rgba(255,215,0,.3);border-radius:12px;padding:10px 14px;text-align:center;min-width:130px;box-shadow:0 0 12px rgba(255,215,0,.1),var(--iso-shadow-sm)}
.mvp-card .mvp-icon{font-size:24px}
.mvp-card .mvp-title{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px}
.mvp-card .mvp-name{font-size:12px;font-weight:700;margin-top:2px}

/* ===== DIFFICULTY VOTE ===== */
.diff-vote{display:flex;gap:10px;justify-content:center;margin:10px 0}
.diff-btn{padding:12px 20px;border:2px solid var(--border);border-bottom:4px solid var(--depth-dark);border-radius:12px;background:var(--card);color:var(--text);font-family:'Fredoka',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .12s;box-shadow:var(--iso-shadow-sm)}
.diff-btn:hover{transform:translateY(-2px);box-shadow:var(--iso-shadow-md)}
.diff-btn.selected{border-color:var(--accent);background:rgba(124,92,255,.1)}
.diff-btn .diff-icon{font-size:20px;display:block;margin-bottom:2px}

/* ===== CUSTOM Q MODAL ===== */
.custom-q-form{display:flex;flex-direction:column;gap:8px;text-align:left;max-height:300px;overflow-y:auto}
.custom-q-form input,.custom-q-form textarea{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:'Fredoka',sans-serif;font-size:13px;outline:none;width:100%}
.custom-q-form textarea{resize:vertical;min-height:40px}

/* ===== LEADERBOARD ===== */
.lb-list{width:100%;display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-bottom:3px solid var(--depth-dark);border-radius:12px;box-shadow:var(--iso-shadow-sm)}
.lb-row .lb-rank{font-size:16px;font-weight:800;color:var(--text-dim);width:30px;text-align:center}
.lb-row .lb-name{flex:1;font-weight:700;font-size:14px}
.lb-row .lb-stat{font-size:13px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace}

/* ===== THEME TOGGLE ===== */
.theme-ocean{--bg:#0a1628;--card:#121e38;--card2:#1a2a4a;--accent:#3b82f6;--accent-dim:#2563eb;--accent-glow:rgba(59,130,246,.3);--border:#2a3a5a;--depth-dark:#060e1a;--depth-mid:#0e1826}
.theme-crimson{--bg:#1a0a0a;--card:#2a1218;--card2:#3a1a22;--accent:#ef4444;--accent-dim:#dc2626;--accent-glow:rgba(239,68,68,.3);--border:#4a2a30;--depth-dark:#0a0406;--depth-mid:#160a0e}
.theme-emerald{--bg:#0a1a0f;--card:#122a18;--card2:#1a3a22;--accent:#22c55e;--accent-dim:#16a34a;--accent-glow:rgba(34,197,94,.3);--border:#2a4a30;--depth-dark:#040a06;--depth-mid:#0a160e}
.theme-sunset{--bg:#1a130a;--card:#2a1e12;--card2:#3a2a1a;--accent:#f59e0b;--accent-dim:#d97706;--accent-glow:rgba(245,158,11,.3);--border:#4a3a20;--depth-dark:#0a0804;--depth-mid:#16120a}

/* ===== MUSIC TOGGLE ===== */
.music-toggle{position:fixed;top:12px;right:12px;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:16px;cursor:pointer;z-index:90;display:none;align-items:center;justify-content:center;box-shadow:var(--iso-shadow-sm)}
.music-toggle.visible{display:flex}

/* ===== STEAL ===== */
.steal-banner{text-align:center;padding:16px;animation:phaseIn .35s ease-out}
.steal-banner .steal-title{font-size:18px;font-weight:800;color:var(--red);margin-bottom:8px}
.steal-btn{padding:14px 28px;border:2px solid var(--gold);border-bottom:4px solid rgba(255,215,0,.4);border-radius:14px;background:rgba(255,215,0,.08);color:var(--gold);font-family:'Fredoka',sans-serif;font-size:16px;font-weight:800;cursor:pointer;animation:stealPulse 1s infinite;box-shadow:0 0 16px rgba(255,215,0,.15)}
@keyframes stealPulse{0%,100%{box-shadow:0 0 16px rgba(255,215,0,.15)}50%{box-shadow:0 0 24px rgba(255,215,0,.3)}}

/* ===== SCORE POPUP ===== */
.score-popup{position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-size:14px;font-weight:800;color:var(--green);pointer-events:none;animation:scoreFloat 1.5s ease-out forwards;white-space:nowrap;z-index:120;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.score-popup.wrong-pop{color:var(--red)}
@keyframes scoreFloat{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}50%{opacity:1;transform:translateX(-50%) translateY(-20px) scale(1.3)}100%{opacity:0;transform:translateX(-50%) translateY(-40px) scale(0.8)}}

/* ===== ANSWER STATS BAR ===== */
.answer-stat{position:absolute;bottom:4px;left:4px;right:4px;height:4px;background:rgba(0,0,0,.3);border-radius:2px;overflow:hidden}
.answer-stat-fill{height:100%;background:rgba(255,255,255,.5);border-radius:2px;transition:width .5s ease}
.answer-stat-pct{position:absolute;top:4px;right:6px;font-size:10px;color:rgba(255,255,255,.7);font-family:'JetBrains Mono',monospace}

/* ===== GAME START COUNTDOWN ===== */
.game-countdown{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column}
.game-countdown .gc-num{font-size:120px;font-weight:800;color:var(--accent);text-shadow:0 0 60px var(--accent-glow),0 6px 0 var(--depth-dark);animation:countPop .5s ease-out}
.game-countdown .gc-text{font-size:20px;color:var(--text-dim);margin-top:10px}
@keyframes countPop{0%{transform:scale(2);opacity:0}50%{transform:scale(0.9)}100%{transform:scale(1);opacity:1}}

/* ===== COPY CODE ===== */
.copy-code-btn{background:none;border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-family:'Fredoka',sans-serif;font-size:11px;padding:4px 10px;cursor:pointer;margin-top:6px;transition:all .15s}
.copy-code-btn:hover{background:rgba(124,92,255,.1)}

/* ===== KICK PLAYER ===== */
.kick-btn{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;border:1px solid var(--red);background:rgba(255,77,77,.15);color:var(--red);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.lobby-player:hover .kick-btn{opacity:1}

/* ===== HOT STREAK ===== */
.pb-player.hot-streak .pb-avatar-wrap{animation:hotGlow 1.5s ease-in-out infinite alternate}
@keyframes hotGlow{0%{filter:drop-shadow(0 0 4px rgba(255,215,0,.3))}100%{filter:drop-shadow(0 0 12px rgba(255,215,0,.7))}}

/* ===== LEADER CROWN ===== */
.pb-player.leader .pb-avatar-wrap::before{content:'👑';position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:14px;z-index:10;animation:crownBob 2s ease-in-out infinite}
@keyframes crownBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-3px)}}

/* ===== COMBO COUNTER ===== */
.combo-display{position:fixed;top:80px;right:20px;text-align:center;z-index:80;pointer-events:none}
.combo-num{font-size:36px;font-weight:800;color:var(--gold);font-family:'JetBrains Mono',monospace;text-shadow:0 0 20px rgba(255,215,0,.5),0 3px 0 var(--depth-dark)}
.combo-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px}
.combo-display.active{animation:comboPulse .4s ease-out}
@keyframes comboPulse{0%{transform:scale(1.4)}50%{transform:scale(0.9)}100%{transform:scale(1)}}

/* ===== ROUND SUMMARY ===== */
.round-summary{text-align:center;padding:20px;animation:phaseIn .35s ease-out}
.round-summary .rs-title{font-size:20px;font-weight:800;color:var(--accent);margin-bottom:12px}
.round-summary .rs-stat{display:inline-block;margin:0 12px;padding:8px 16px;background:var(--card);border:1px solid var(--border);border-bottom:3px solid var(--depth-dark);border-radius:10px;font-size:13px}
.round-summary .rs-stat .rs-val{font-size:20px;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace}

/* ===== RANDOM EVENT BANNER ===== */
.event-banner{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:12px 28px;background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(124,92,255,.15));border:2px solid var(--gold);border-radius:14px;z-index:200;animation:eventSlide 4s ease-in-out forwards;font-size:16px;font-weight:800;color:var(--gold);text-align:center;white-space:nowrap;box-shadow:0 0 30px rgba(255,215,0,.2)}
@keyframes eventSlide{0%{opacity:0;transform:translateX(-50%) translateY(-30px)}10%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-30px)}}

/* ===== TIMER CHOICE ===== */
.timer-choice{display:flex;gap:8px;justify-content:center;margin:6px 0}
.timer-btn{padding:8px 16px;border:2px solid var(--border);border-bottom:3px solid var(--depth-dark);border-radius:10px;background:var(--card);color:var(--text);font-family:'Fredoka',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s}
.timer-btn:hover{transform:translateY(-2px)}
.timer-btn.selected{border-color:var(--accent);background:rgba(124,92,255,.1)}
</style>

<body>
<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="config.js"></script>
<script>
'use strict';

/* ===== CONSTANTS ===== */
const AVATARS=[
{id:'bald-guy',name:'Bald Guy'},{id:'headset-girl',name:'Headset Girl'},{id:'cool-guy',name:'Cool Guy'},
{id:'asian-girl',name:'Asian Girl'},{id:'green-shirt',name:'Green Shirt'},{id:'viking',name:'Viking'},
{id:'alien',name:'Alien'},{id:'robot',name:'Robot'},{id:'skeleton',name:'Skeleton'},
{id:'flower-girl',name:'Flower Girl'},{id:'nerd',name:'Nerd'},{id:'punk-girl',name:'Punk Girl'},
{id:'dog',name:'Dog'},{id:'wizard',name:'Wizard'},{id:'frankenstein',name:'Frankenstein'}
];
function avatarImg(id,size){size=size||40;return`<img src="avatars/${id}.png" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover" alt="">`}
function avatarOrFallback(id,size){if(!id||id.length<=4)return`<span style="font-size:${(size||40)*0.7}px">${id||'😎'}</span>`;return avatarImg(id,size)}
const CATEGORIES=[
{id:'league-of-legends',name:'League of Legends',icon:'⚔️',color:'#c89b3c'},
{id:'runescape',name:'RuneScape',icon:'🗡️',color:'#d4a017'},
{id:'modern-history',name:'Modern History',icon:'📜',color:'#8b7355'},
{id:'world-of-warcraft',name:'World of Warcraft',icon:'🐉',color:'#0070dd'},
{id:'geography',name:'Geography',icon:'🌍',color:'#2ecc71'},
{id:'science',name:'Science',icon:'🔬',color:'#9b59b6'},
{id:'movies-tv',name:'Movies & TV',icon:'🎬',color:'#e74c3c'},
{id:'general-knowledge',name:'General Knowledge',icon:'🧠',color:'#3498db'}
];

const SHOP_SOUNDS=[
{id:'airhorn',name:'Air Horn',price:100,emoji:'📯'},
{id:'bruh',name:'Bruh',price:150,emoji:'😐'},
{id:'sadviolin',name:'Sad Violin',price:200,emoji:'🎻'},
{id:'wow',name:'WOW',price:100,emoji:'😮'},
{id:'oof',name:'OOF',price:75,emoji:'💀'},
{id:'rizz',name:'Rizz',price:250,emoji:'😏'}
];

const SHOP_EMOTES=[
{id:'laughing',name:'Laughing',price:50,emoji:'😂'},
{id:'skull',name:'Skull',price:50,emoji:'💀'},
{id:'clown',name:'Clown',price:75,emoji:'🤡'},
{id:'fire',name:'Fire',price:75,emoji:'🔥'},
{id:'cap',name:'Cap',price:100,emoji:'🧢'},
{id:'nerd',name:'Nerd',price:100,emoji:'🤓'}
];

/* OpenTDB category mapping for API-sourced questions */
const OPENTDB_MAP={
'geography':22,'science':17,'movies-tv':11,'general-knowledge':9,'modern-history':23
};
const API_CATEGORIES=['geography','science','movies-tv','general-knowledge','modern-history'];
const apiCache={};
let apiSessionToken=null;

async function getApiToken(){
try{const r=await fetch('https://opentdb.com/api_token.php?command=request');const d=await r.json();
if(d.response_code===0)apiSessionToken=d.token}catch(e){}}

function decodeHTML(s){const t=document.createElement('textarea');t.innerHTML=s;return t.value}

async function fetchApiQuestions(catId,amount){
const otdbCat=OPENTDB_MAP[catId];
if(!otdbCat)return[];
const cacheKey=catId;
if(!apiCache[cacheKey])apiCache[cacheKey]=[];
if(apiCache[cacheKey].length>=amount)return apiCache[cacheKey].splice(0,amount);
try{
let url=`https://opentdb.com/api.php?amount=30&category=${otdbCat}&type=multiple`;
if(apiSessionToken)url+=`&token=${apiSessionToken}`;
const r=await fetch(url);const d=await r.json();
if(d.response_code===0&&d.results){
const qs=d.results.map((r,i)=>{
const correct=decodeHTML(r.correct_answer);
const wrong=r.incorrect_answers.map(a=>decodeHTML(a));
const answers=[correct,...wrong];
const pts=r.difficulty==='hard'?5:1;
return{id:'api_'+catId+'_'+Date.now()+'_'+i,q:decodeHTML(r.question),answers,correct:0,points:pts}});
apiCache[cacheKey].push(...qs)}
}catch(e){}
return apiCache[cacheKey].splice(0,Math.min(amount,apiCache[cacheKey].length))}

/* Hardcoded questions for gaming categories (no API available) + fallback for others */
const QUESTIONS={
'league-of-legends':[
{id:'lol1',q:"Which champion is known as 'The Unforgiven'?",answers:['Yasuo','Yone','Zed','Riven'],correct:0,points:1},

/* ===== FIREBASE ===== */
function initFB(){
try{
if(typeof FIREBASE_CONFIG==='undefined'||!FIREBASE_CONFIG.apiKey)return false;
firebase.initializeApp(FIREBASE_CONFIG);
db=firebase.database();
db.ref('.info/connected').on('value',s=>{fbOk=s.val()===true});
fbOk=true;return true;
}catch(e){console.error('Firebase init error:',e);return false}}

/* ===== AUTH ===== */
async function hashPw(pw){
const d=new TextEncoder().encode(pw+'banter-quiz-salt-2025');
const h=await crypto.subtle.digest('SHA-256',d);
return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}

async function fetchUser(n){
if(!db)return null;
try{const s=await db.ref('quiz/users/'+sk(n)).once('value');return s.val()}catch(e){return null}}

async function registerUser(n,pw,avatar,displayName){
if(!db)return{ok:false,error:"Can't connect"};
const ex=await fetchUser(n);
if(ex)return{ok:false,error:'Name taken!'};
const h=await hashPw(pw);
try{
await db.ref('quiz/users/'+sk(n)).set({
name:n,passwordHash:h,displayName:displayName||n,avatar:avatar||'bald-guy',
coins:0,purchasedSounds:{},purchasedEmotes:{},
gamesPlayed:0,gamesWon:0,totalCorrect:0,createdAt:Date.now()});
return{ok:true}}catch(e){return{ok:false,error:'Failed: '+e.message}}}

async function loginUser(n,pw){
if(!db)return{ok:false,error:"Can't connect"};
const ex=await fetchUser(n);
if(!ex)return{ok:false,error:'No account with that name.'};
const h=await hashPw(pw);
if(ex.passwordHash!==h)return{ok:false,error:'Wrong password!'};
return{ok:true,data:ex}}

function defUserData(){return{name:'',displayName:'',avatar:'bald-guy',coins:0,purchasedSounds:{},purchasedEmotes:{},gamesPlayed:0,gamesWon:0,totalCorrect:0}}

/* ===== SCREENS ===== */
function showScreen(name,data){
currentScreen=name;
cleanupListeners();
const app=document.getElementById('app');
switch(name){
case 'auth':renderAuth();break;
case 'avatarSetup':renderAvatarSetup();break;
case 'menu':renderMenu();break;
case 'lobby':renderLobby(data);break;
case 'game':renderGame();break;
case 'results':renderResults(data);break;
}}

function cleanupListeners(){
if(lobbyRef){lobbyRef.off();lobbyRef=null}
if(soundboardRef){soundboardRef.off();soundboardRef=null}
if(emoteRef){emoteRef.off();emoteRef=null}
if(chatRef){chatRef.off();chatRef=null}
if(tauntRef){tauntRef.off();tauntRef=null}
if(gameTimer){clearInterval(gameTimer);gameTimer=null}
soundboardOpen=false;advancing=false;
const sb=document.getElementById('gameSidebar');if(sb)sb.remove();
const bar=document.getElementById('playerBar');if(bar)bar.remove();
const sbt=document.getElementById('sbToggle');if(sbt)sbt.remove();
const sbp=document.getElementById('sbPanel');if(sbp)sbp.remove()}

async function doLogin(){

async function doRegister(){

const err=document.getElementById('aErr');

const r=await registerUser(n,p,selectedAvatar,dn.trim()||n);
if(!r.ok){err.innerHTML=`<div class="auth-error">${r.error}</div>`;btn.textContent='CREATE ACCOUNT';btn.disabled=false;return}
player=n;userData={...defUserData(),name:n,displayName:dn.trim()||n,avatar:selectedAvatar||'bald-guy'};
const h=await hashPw(p);
localStorage.setItem('quizSession',JSON.stringify({name:n,pwHash:h}));
showScreen('menu')}

async function autoLogin(n,pwHash){
const ex=await fetchUser(n);
if(ex&&ex.passwordHash===pwHash){player=n;userData=ex;showScreen('menu')}
else{localStorage.removeItem('quizSession');showScreen('auth')}}

/* ===== LOBBY ===== */
function generateLobbyCode(){
const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let code='';
for(let i=0;i<6;i++)code+=c[Math.floor(Math.random()*c.length)];return code}

async function createLobby(){
if(!db||!player)return;
const code=generateLobbyCode();
const ex=await db.ref('quiz/lobbies/'+code).once('value');
if(ex.exists())return createLobby();
const u=userData||defUserData();
await db.ref('quiz/lobbies/'+code).set({
hostKey:sk(player),status:'waiting',createdAt:Date.now(),
settings:{totalRounds:8,timePerQuestion:20,questionsPerRound:5}});
await db.ref('quiz/lobbies/'+code+'/players/'+sk(player)).set({
name:player,displayName:u.displayName||player,avatar:u.avatar||'bald-guy',score:0,connected:true,joinedAt:Date.now()});
await db.ref('quiz/lobbies/'+code+'/players/'+sk(player)).onDisconnect().update({connected:false});
lobbyCode=code;isHost=true;
showScreen('lobby',{code})}

async function joinLobby(code){
if(!db||!player)return;
code=code.toUpperCase().trim();
const snap=await db.ref('quiz/lobbies/'+code).once('value');
if(!snap.exists()){showToast('Lobby not found!','error');return}
const lobby=snap.val();
if(lobby.status!=='waiting'){showToast('Game already started!','error');return}
const playerCount=lobby.players?Object.keys(lobby.players).length:0;
if(playerCount>=12){showToast('Lobby is full!','error');return}
const u=userData||defUserData();
await db.ref('quiz/lobbies/'+code+'/players/'+sk(player)).set({
name:player,displayName:u.displayName||player,avatar:u.avatar||'bald-guy',score:0,connected:true,joinedAt:Date.now()});
await db.ref('quiz/lobbies/'+code+'/players/'+sk(player)).onDisconnect().update({connected:false});
lobbyCode=code;isHost=(lobby.hostKey===sk(player));
showScreen('lobby',{code})}

async function leaveLobby(){
if(!lobbyCode||!player)return;
if(isHost){await db.ref('quiz/lobbies/'+lobbyCode).remove()}
else{await db.ref('quiz/lobbies/'+lobbyCode+'/players/'+sk(player)).remove()}
lobbyCode=null;lobbyData=null;isHost=false;showScreen('menu')}

/* ===== GAME ===== */
async function startGame(){
sfxGameStart();
if(!isHost||!lobbyCode)return;
const lobby=lobbyData;if(!lobby)return;
const players=lobby.players?Object.entries(lobby.players).filter(([k,v])=>v.connected!==false):[];
if(players.length<2)return;
const order=players.map(([k])=>k).sort(()=>Math.random()-.5);
await db.ref('quiz/lobbies/'+lobbyCode).update({status:'playing'});
await db.ref('quiz/lobbies/'+lobbyCode+'/gameState').set({
currentQuestion:0,pickerIndex:0,
phase:'pickCategory',currentPicker:order[0],pickerOrder:order,
selectedCategory:'',usedCategories:[],usedQuestionIds:[],
currentQuestionData:null,playerAnswers:null,results:null})}

function renderGame(){
if(!lobbyCode)return;
if(!lobbyRef){
lobbyRef=db.ref('quiz/lobbies/'+lobbyCode);
lobbyRef.on('value',snap=>{
const lobby=snap.val();
if(!lobby){showScreen('menu');return}
lobbyData=lobby;
if(lobby.status==='finished'){renderResults();return}
updateGameUI(lobby)})
}else if(lobbyData){updateGameUI(lobbyData)}}

function updateGameUI(lobby){
const gs=lobby.gameState;if(!gs)return;
const players=lobby.players||{};
const phase=gs.phase;
currentScreen='game';
if(phase!=='showQuestion'){hidden5050=[];window._lastEventShown=null}

if(phase==='gameOver'){renderResults();return}

// Host auto-advances when a non-host picks a category
if(isHost&&phase==='pickCategory'&&gs.selectedCategory){hostShowNextQuestion();return}

// Host auto-advances when all players have answered
if(isHost&&phase==='showQuestion'){
const connPlayers=Object.keys(players).filter(k=>players[k].connected!==false);
const ans=gs.playerAnswers||{};
const allAnswered=connPlayers.length>0&&connPlayers.every(k=>ans[k]!==undefined&&ans[k]!==null);
if(allAnswered){hostAdvanceFromQuestion();return}}

let content='';
const sorted=Object.entries(players).filter(([k,v])=>v.connected!==false).sort((a,b)=>(b[1].score||0)-(a[1].score||0));

const answers=gs.playerAnswers||{};
const picker=gs.currentPicker||'';
const leaderKey=sorted.length>0?sorted[0][0]:null;
const playerBarHTML=`<div class="player-bar" id="playerBar">
${sorted.map(([k,v])=>{
const hasAnswered=answers[k]!==undefined&&answers[k]!==null;
const isPicking=k===picker&&phase==='pickCategory';
const streak=v.streak||0;
const isLeader=k===leaderKey&&(v.score||0)>0;
return`<div class="pb-player ${k===sk(player)?'me':''} ${hasAnswered&&phase==='showQuestion'?'answered':''} ${isPicking?'picking':''} ${streak>=3?'hot-streak':''} ${isLeader?'leader':''}" data-pk="${k}">
<div class="pb-avatar-wrap">${avatarOrFallback(v.avatar,44)}</div>
${streak>=2?`<div class="pb-streak">🔥${streak}</div>`:''}
<div class="pb-name">${esc(v.displayName||v.name)}</div>
<div class="pb-score">${v.score||0}</div></div>`}).join('')}</div>`;

if(phase==='pickCategory'){
const picker=gs.currentPicker;
const isPicker=(picker===sk(player));
const pickerName=players[picker]?players[picker].displayName||players[picker].name:'???';
const used=gs.usedCategories||[];
if(isPicker){
const myVote=gs.diffVotes&&gs.diffVotes[sk(player)];
const qMode=gs.questionMode||'normal';
content=`<div class="category-pick">
<div class="pick-title">Your turn to pick!</div>
<div class="pick-sub">Choose question type & category</div>
<div class="diff-vote" style="margin-bottom:6px">
<button class="diff-btn ${qMode==='normal'?'selected':''}" onclick="setQuestionMode('normal')"><span class="diff-icon">📝</span>Normal</button>
<button class="diff-btn ${qMode==='picture'?'selected':''}" onclick="setQuestionMode('picture')"><span class="diff-icon">🖼️</span>Picture</button>
<button class="diff-btn ${qMode==='random'?'selected':''}" onclick="setQuestionMode('random')"><span class="diff-icon">🎲</span>Random</button>
</div>
<div class="timer-choice">
<button class="timer-btn ${(gs.roundTimer||20)===10?'selected':''}" onclick="setRoundTimer(10)">⚡ 10s</button>
<button class="timer-btn ${(gs.roundTimer||20)===20?'selected':''}" onclick="setRoundTimer(20)">⏱️ 20s</button>
<button class="timer-btn ${(gs.roundTimer||20)===30?'selected':''}" onclick="setRoundTimer(30)">🐢 30s</button>
</div>
<div class="diff-vote"><button class="diff-btn ${myVote==='easy'?'selected':''}" data-diff="easy" onclick="voteDifficulty('easy')"><span class="diff-icon">😊</span>Easy</button><button class="diff-btn ${myVote==='medium'?'selected':''}" data-diff="medium" onclick="voteDifficulty('medium')"><span class="diff-icon">🤔</span>Medium</button><button class="diff-btn ${myVote==='hard'?'selected':''}" data-diff="hard" onclick="voteDifficulty('hard')"><span class="diff-icon">💀</span>Hard</button></div>
<div class="category-grid">
${CATEGORIES.map(c=>`<button class="cat-btn" ${used.includes(c.id)?'disabled':''} onclick="pickCategory('${c.id}')" style="border-color:${c.color}"><span class="cat-icon">${c.icon}</span><span class="cat-name">${c.name}</span></button>`).join('')}
</div></div>`}
else{content=`<div class="waiting-box"><div class="waiting-icon">🤔</div><div>${esc(pickerName)} is picking a category<span class="waiting-dots"></span></div></div>`}
}else if(phase==='showQuestion'){
const qd=gs.currentQuestionData;if(!qd)return;
const myAnswer=gs.playerAnswers&&gs.playerAnswers[sk(player)];
const hasAnswered=myAnswer!==undefined&&myAnswer!==null;
const timerSecs=qd.speedRound?10:(gs.roundTimer||20);
const elapsed=Math.max(0,(Date.now()-qd.startedAt)/1000);
const remaining=Math.max(0,timerSecs-elapsed);
// Show event banner once
if(qd.event&&!window._lastEventShown){window._lastEventShown=qd.startedAt;showEventBanner(qd.event)}
const pct=Math.max(0,(remaining/timerSecs)*100);
const cat=CATEGORIES.find(c=>c.id===gs.selectedCategory);
const isSil=!!qd.img;
const myStreak=players[sk(player)]?players[sk(player)].streak||0:0;
content=`<div class="game-header"><span class="game-round">Question ${(gs.currentQuestion||0)+1}/${CATEGORIES.length}</span><span class="game-category">${cat?cat.icon+' '+cat.name:''}</span></div>
${myStreak>=2?`<div class="combo-display active"><div class="combo-num">${myStreak}x</div><div class="combo-label">Streak</div></div>`:''}
<div class="timer-bar-wrap"><div class="timer-bar-fill ${remaining<5?'urgent':''}" style="width:${pct}%"></div></div>
<div class="timer-text">${Math.ceil(remaining)}s</div>
${isSil?`<div class="sil-card"><span class="question-points pts5">${qd.points}pts</span><div class="sil-label">${esc(qd.question)}</div><img class="sil-img" src="${qd.img}" onerror="this.style.display='none';this.parentElement.querySelector('.sil-label').textContent='🖼️ '+this.parentElement.querySelector('.sil-label').textContent+' (image failed to load)'" alt="?"></div>`
:`<div class="question-card"><span class="question-points ${qd.points>=5?'pts5':'pts1'}">${qd.points}pt${qd.points>1?'s':''}</span><div class="question-text">${qd.blindRound?'🙈 ???':esc(qd.question)}</div></div>`}
<div class="${isSil?'answers-grid-10':'answers-grid'}">${qd.answers.map((a,i)=>`<button class="answer-btn ${hasAnswered?(myAnswer.answerIndex===i?'selected':'locked'):''}${hasAnswered?' disabled':''}" onclick="submitAnswer(${i})">${esc(a)}</button>`).join('')}</div>
${hasAnswered?'<div style="text-align:center;color:var(--text-dim);font-size:12px;margin-top:4px">Answer locked in!</div>':''}`;
startTimerTick()}
else if(phase==='showAnswer'){
const qd=gs.currentQuestionData;if(!qd)return;
const myAnswer=gs.playerAnswers&&gs.playerAnswers[sk(player)];
const qIdx=gs.currentQuestion||0;
if(lastSfxQuestion!==qIdx){lastSfxQuestion=qIdx;
const gotIt=myAnswer&&myAnswer.answerIndex===qd.correctIndex;
if(gotIt){sfxCorrect();screenFlash('correct')}else{sfxWrong();screenFlash('wrong')}
setTimeout(()=>showPlayerReactions(gs),200);

setTimeout(()=>{const allAns=gs.playerAnswers||{};Object.entries(allAns).forEach(([k,v])=>{if(!v)return;const c=v.answerIndex===qd.correctIndex;showScorePopup(k,c?qd.points:0,c)})},400)}
const cat=CATEGORIES.find(c=>c.id===gs.selectedCategory);
const isSil=!!qd.img;
const fastK=gs.fastestPlayer;
const fastP=fastK&&players[fastK]?players[fastK]:null;
// Calculate answer distribution
const allAns=gs.playerAnswers||{};
const totalAns=Object.values(allAns).filter(v=>v).length;
const ansCount={};Object.values(allAns).forEach(v=>{if(v){ansCount[v.answerIndex]=(ansCount[v.answerIndex]||0)+1}});
content=`<div class="game-header"><span class="game-round">Question ${(gs.currentQuestion||0)+1}/${CATEGORIES.length}</span><span class="game-category">${cat?cat.icon+' '+cat.name:''}</span></div>
${isSil?`<div class="sil-card revealed"><span class="question-points pts5">5pts</span><div class="sil-label">${esc(qd.answers[qd.correctIndex])}</div><img class="sil-img revealed" src="${qd.img}" onerror="this.style.display='none'" alt=""></div>`
:`<div class="question-card"><span class="question-points ${qd.points===5?'pts5':'pts1'}">${qd.points}pt${qd.points>1?'s':''}</span><div class="question-text">${esc(qd.question)}</div></div>`}

function startTimerTick(){
if(gameTimer)clearInterval(gameTimer);
gameTimer=setInterval(()=>{
const gs=lobbyData&&lobbyData.gameState;
if(!gs||gs.phase!=='showQuestion'){clearInterval(gameTimer);gameTimer=null;return}
const qd=gs.currentQuestionData;if(!qd)return;
const tSecs=qd.speedRound?10:(gs.roundTimer||20);
const elapsed=(Date.now()-qd.startedAt)/1000;
const remaining=Math.max(0,tSecs-elapsed);
const pct=Math.max(0,(remaining/tSecs)*100);
const timerEl=document.querySelector('.timer-text');
const barEl=document.querySelector('.timer-bar-fill');
if(timerEl)timerEl.textContent=Math.ceil(remaining)+'s';
if(barEl){barEl.style.width=pct+'%';if(remaining<5){barEl.classList.add('urgent');const sec=Math.ceil(remaining);if(sec>0&&sec<=5&&Math.abs(remaining-sec)<0.3)sfxCountdown()}else barEl.classList.remove('urgent')}
if(remaining<=0&&isHost){clearInterval(gameTimer);gameTimer=null;hostAdvanceFromQuestion()}
},500)}

/* ===== HOST GAME CONTROL ===== */
async function hostShowNextQuestion(){
if(!isHost||!lobbyCode)return;
advancing=false;
const gs=lobbyData.gameState;
const cat=gs.selectedCategory;
const used=gs.usedQuestionIds||[];
const qMode=gs.questionMode||'random';
let q=null;
const silPool=SILHOUETTE_QS[cat]||[];
const availSil=silPool.filter(s=>!used.includes(s.id));
// Question mode: 'picture' = force silhouette, 'normal' = force text, 'random' = 40% chance
if(qMode==='picture'&&availSil.length>0){
q=availSil[Math.floor(Math.random()*availSil.length)]
}else if(qMode==='random'&&availSil.length>0&&Math.random()<0.4){
q=availSil[Math.floor(Math.random()*availSil.length)]
}
// For 'normal' mode, skip silhouettes entirely
// Try API for supported categories
if(!q&&API_CATEGORIES.includes(cat)){
const apiQs=await fetchApiQuestions(cat,1);
if(apiQs.length>0)q=apiQs[0]}
// Fall back to hardcoded
if(!q){
const pool=QUESTIONS[cat]||[];
const available=pool.filter(p=>!used.includes(p.id));
if(available.length>0)q=available[Math.floor(Math.random()*available.length)]}
if(!q){q={id:'fallback_'+Date.now(),q:'No more questions available!',answers:['True','False','Maybe','Skip'],correct:0,points:1}}
const shuffled=shuffleAnswers(q);
used.push(q.id);
const qData={question:q.q,answers:shuffled.answers,correctIndex:shuffled.correctIndex,points:q.points,startedAt:Date.now()};
if(q.img)qData.img=q.img;
// 20% chance of random event (not on first question)
const qNum=gs.currentQuestion||0;
if(qNum>0&&Math.random()<0.2){
const evt=RANDOM_EVENTS[Math.floor(Math.random()*RANDOM_EVENTS.length)];
evt.apply(qData,gs);
qData.event=evt.text}
await db.ref('quiz/lobbies/'+lobbyCode+'/gameState').update({
phase:'showQuestion',currentQuestionData:qData,
playerAnswers:null,usedQuestionIds:used})}

function shuffleAnswers(q){
const indices=Array.from({length:q.answers.length},(_,i)=>i);
for(let i=indices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[indices[i],indices[j]]=[indices[j],indices[i]]}
const newAnswers=indices.map(i=>q.answers[i]);
const newCorrect=indices.indexOf(q.correct);
return{answers:newAnswers,correctIndex:newCorrect}}

async function hostAdvanceFromQuestion(){
if(!isHost||!lobbyCode||advancing)return;
advancing=true;
const gs=lobbyData.gameState;if(!gs)return;
const qd=gs.currentQuestionData;if(!qd)return;
const answers=gs.playerAnswers||{};
const players=lobbyData.players||{};
const updates={};
let fastest=null,fastestTime=Infinity,anyCorrect=false;
Object.entries(answers).forEach(([k,v])=>{
const correct=v&&v.answerIndex===qd.correctIndex;
const cur=players[k]?players[k].score||0:0;
const curStreak=players[k]?players[k].streak||0:0;
const maxStreak=players[k]?players[k].maxStreak||0:0;
if(correct){
anyCorrect=true;
let pts=qd.points;
const speed=v.answeredAt?((v.answeredAt-qd.startedAt)/1000):20;
if(speed<5)pts+=1;
if(curStreak>=2)pts+=1;
const usedDbl=gs.usedDouble||{};
if(usedDbl[k])pts*=2;
updates['players/'+k+'/score']=cur+pts;
updates['players/'+k+'/streak']=curStreak+1;
if(curStreak+1>maxStreak)updates['players/'+k+'/maxStreak']=curStreak+1;
if(speed<fastestTime){fastestTime=speed;fastest=k}
}else{
updates['players/'+k+'/streak']=0}});
// If nobody got it right, trigger steal round
if(!anyCorrect&&Object.keys(answers).length>0){
updates['gameState/phase']='steal';
updates['gameState/stealAnswers']=null;
await db.ref('quiz/lobbies/'+lobbyCode).update(updates);
// Give 10s for steal, then advance
setTimeout(()=>{if(isHost&&lobbyData&&lobbyData.gameState&&lobbyData.gameState.phase==='steal')hostResolveSteal()},10000);
return}
if(fastest)updates['gameState/fastestPlayer']=fastest;
showDrumroll(async()=>{
updates['gameState/phase']='showAnswer';
await db.ref('quiz/lobbies/'+lobbyCode).update(updates);
setTimeout(()=>{showReactionCam(lobbyData.gameState,lobbyData.players)},500);
setTimeout(()=>hostAfterAnswer(),4000)})}

async function hostResolveSteal(){
if(!isHost||!lobbyCode)return;
const gs=lobbyData.gameState;if(!gs)return;
const qd=gs.currentQuestionData;if(!qd)return;
const steals=gs.stealAnswers||{};
const players=lobbyData.players||{};
const updates={};
// Find first correct steal
let stealWinner=null;
Object.entries(steals).sort((a,b)=>(a[1].answeredAt||0)-(b[1].answeredAt||0)).forEach(([k,v])=>{
if(!stealWinner&&v&&v.answerIndex===qd.correctIndex){
stealWinner=k;
const cur=players[k]?players[k].score||0:0;
updates['players/'+k+'/score']=cur+qd.points*2;
updates['players/'+k+'/streak']=(players[k]?players[k].streak||0:0)+1}});
updates['gameState/phase']='showAnswer';
if(stealWinner)updates['gameState/fastestPlayer']=stealWinner;
await db.ref('quiz/lobbies/'+lobbyCode).update(updates);
setTimeout(()=>hostAfterAnswer(),3000)}

// Game over when all 8 categories used
if(used.length>=CATEGORIES.length){hostEndGame();return}
// Rotate to next picker
const order=gs.pickerOrder||[];
const pickerIdx=(gs.pickerIndex||0)+1;
const nextPicker=order[pickerIdx%order.length];
const qNum=(gs.currentQuestion||0)+1;
setTimeout(async()=>{
await db.ref('quiz/lobbies/'+lobbyCode+'/gameState').update({
phase:'pickCategory',currentPicker:nextPicker,pickerIndex:pickerIdx,
selectedCategory:'',playerAnswers:null,currentQuestion:qNum,questionMode:'random',diffVotes:null,roundTimer:20})},3000)}

async function hostEndGame(){
if(!isHost||!lobbyCode)return;
const players=lobbyData.players||{};
const sorted=Object.entries(players).filter(([k,v])=>v.connected!==false).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
const results={};
sorted.forEach(([k,v],i)=>{
let coinsEarned=0;
const correct=v.score||0;
coinsEarned=correct*2;
if(i===0)coinsEarned+=10;
else if(i===1)coinsEarned+=5;
else if(i===2)coinsEarned+=3;
results[k]={finalScore:v.score||0,rank:i+1,coinsEarned,name:v.name,displayName:v.displayName||v.name,avatar:v.avatar||'😎',maxStreak:v.maxStreak||0};
// Update user coins and stats
db.ref('quiz/users/'+k+'/coins').transaction(c=>(Number(c)||0)+coinsEarned);
db.ref('quiz/users/'+k+'/gamesPlayed').transaction(c=>(Number(c)||0)+1);
if(i===0)db.ref('quiz/users/'+k+'/gamesWon').transaction(c=>(Number(c)||0)+1);
db.ref('quiz/users/'+k+'/totalCorrect').transaction(c=>(Number(c)||0)+(v.score||0))});
await db.ref('quiz/lobbies/'+lobbyCode+'/gameState').update({phase:'gameOver',results});
await db.ref('quiz/lobbies/'+lobbyCode).update({status:'finished'})}

function createBgMusic(){
if(bgMusic)return;
const ctx=getAudioCtx();
bgMusic={ctx,playing:false};
startBgLoop()}

function startBgLoop(){
if(!bgMusic||!bgMusic.ctx)return;
const ctx=bgMusic.ctx;
const now=ctx.currentTime;
const notes=[261,293,329,349,392,349,329,293];
const gainNode=ctx.createGain();gainNode.gain.value=0.04;gainNode.connect(ctx.destination);
bgMusic.gainNode=gainNode;
function playBar(startTime){
notes.forEach((freq,i)=>{
const osc=ctx.createOscillator();osc.type='sine';osc.frequency.value=freq;
const g=ctx.createGain();g.gain.setValueAtTime(0.04,startTime+i*0.5);g.gain.exponentialRampToValueAtTime(0.001,startTime+i*0.5+0.45);
osc.connect(g);g.connect(gainNode);osc.start(startTime+i*0.5);osc.stop(startTime+i*0.5+0.45)});
bgMusic.nextBar=setTimeout(()=>playBar(ctx.currentTime),notes.length*500)}
bgMusic.playing=true;
playBar(now)}

function stopBgMusic(){
if(!bgMusic)return;
bgMusic.playing=false;
if(bgMusic.nextBar)clearTimeout(bgMusic.nextBar);
if(bgMusic.gainNode)bgMusic.gainNode.gain.value=0}

function toggleMusic(){
if(!bgMusic)createBgMusic();
else if(bgMusic.playing)stopBgMusic();
else startBgLoop();
const btn=document.getElementById('musicBtn');
if(btn)btn.textContent=bgMusic&&bgMusic.playing?'🔇':'🎵'}

/* ===== MVP AWARDS ===== */
function generateMVPs(results,gs){
const mvps=[];
const entries=Object.entries(results);
if(entries.length===0)return mvps;
// Speed Demon - player who answered fastest overall
let speedDemon=null,bestAvgSpeed=Infinity;
entries.forEach(([k,v])=>{if(v.avgSpeed&&v.avgSpeed<bestAvgSpeed){bestAvgSpeed=v.avgSpeed;speedDemon=v}});
if(speedDemon)mvps.push({icon:'⚡',title:'Speed Demon',name:speedDemon.displayName||speedDemon.name});
// Streak Master - highest streak
let streakMaster=null,bestStreak=0;
entries.forEach(([k,v])=>{if((v.maxStreak||0)>bestStreak){bestStreak=v.maxStreak;streakMaster=v}});
if(streakMaster&&bestStreak>=2)mvps.push({icon:'🔥',title:'Streak Master',name:streakMaster.displayName||streakMaster.name});
// Comeback King - biggest score jump in second half (approximated by rank vs early performance)
if(entries.length>=3){
const last=entries[entries.length-1];
mvps.push({icon:'👑',title:'Comeback King',name:last[1].displayName||last[1].name})}
// Brain - most correct answers (top scorer already on podium, so this is mostly the same)
const top=entries[0];
if(top)mvps.push({icon:'🧠',title:'Big Brain',name:top[1].displayName||top[1].name});
return mvps}
