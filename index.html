<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BANTER QUIZ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0a1a;--card:#1a1230;--card2:#241a40;--accent:#7c5cff;--accent-dim:#5a3fd4;--accent-glow:rgba(124,92,255,.3);--text:#f0eaff;--text-dim:#8a7aaa;--green:#7ed957;--red:#ff4d4d;--orange:#ffb347;--gold:#ffd700;--border:#3a2a60;--depth-dark:#0a0612;--depth-mid:#120e22;--iso-shadow-sm:3px 3px 0 var(--depth-dark);--iso-shadow-md:4px 4px 0 var(--depth-dark),5px 5px 0 rgba(0,0,0,.3);--iso-shadow-lg:4px 4px 0 var(--depth-dark),6px 6px 0 rgba(0,0,0,.35),8px 8px 0 rgba(0,0,0,.15);--ans-blue:#3b82f6;--ans-red:#ef4444;--ans-green:#22c55e;--ans-orange:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Fredoka',sans-serif;background:linear-gradient(170deg,var(--bg) 0%,#060412 100%);color:var(--text);min-height:100vh;overflow-x:hidden;background-image:linear-gradient(45deg,rgba(124,92,255,.015) 25%,transparent 25%),linear-gradient(-45deg,rgba(124,92,255,.015) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,rgba(124,92,255,.015) 75%),linear-gradient(-45deg,transparent 75%,rgba(124,92,255,.015) 75%);background-size:40px 40px;background-position:0 0,0 20px,20px -20px,-20px 0}
#app{max-width:520px;margin:0 auto;position:relative;min-height:100vh;padding-bottom:20px}

/* ===== AUTH ===== */
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.auth-inner{max-width:380px;width:100%}
.auth-logo{font-size:72px;animation:logoFloat 3s ease-in-out infinite;display:block;margin-bottom:8px;filter:drop-shadow(0 4px 20px var(--accent-glow))}
@keyframes logoFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
.game-title{font-size:34px;font-weight:800;color:var(--accent);letter-spacing:4px;text-shadow:0 0 30px var(--accent-glow),0 3px 0 var(--depth-dark)}
.subtitle{color:var(--text-dim);font-size:14px;margin-top:6px;font-weight:500}
.auth-form{margin-top:24px;text-align:left}
.field-label{display:block;font-size:13px;color:var(--text-dim);margin-bottom:6px;margin-top:14px}
.field-input{width:100%;padding:13px 16px;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:16px;font-family:'Fredoka',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 16px var(--accent-glow)}
.btn-primary{width:100%;padding:14px 0;margin-top:18px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),#5a3fd4);color:white;font-size:16px;font-weight:800;font-family:'Fredoka',sans-serif;cursor:pointer;letter-spacing:2px;text-transform:uppercase;box-shadow:0 5px 0 var(--depth-dark),0 8px 20px var(--accent-glow);transition:all .1s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 7px 0 var(--depth-dark),0 10px 24px var(--accent-glow)}
.btn-primary:active{transform:translateY(3px);box-shadow:0 1px 0 var(--depth-dark)}
.btn-primary:disabled{opacity:.4;cursor:default;transform:none}
.auth-toggle{color:var(--accent);cursor:pointer;background:none;border:none;font-family:'Fredoka',sans-serif;font-size:14px;margin-top:14px;text-decoration:underline;display:block;text-align:center;width:100%}
.auth-error{color:var(--red);font-size:13px;margin-top:10px;text-align:center;padding:8px;background:rgba(255,87,87,.1);border-radius:8px}
.fb-status{margin-top:14px;font-size:12px;padding:6px 10px;border-radius:6px}
.fb-status.ok{background:rgba(76,223,122,.15);color:var(--green)}
.fb-status.bad{background:rgba(255,87,87,.15);color:var(--red)}

/* ===== AVATAR SELECT ===== */
.avatar-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:16px}
.avatar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:320px}
.avatar-opt{width:64px;height:64px;border-radius:16px;border:3px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;transition:all .12s;box-shadow:var(--iso-shadow-sm);border-bottom:4px solid var(--depth-dark)}
.avatar-opt:hover{transform:translateY(-3px);box-shadow:var(--iso-shadow-md);border-color:var(--accent-dim)}
.avatar-opt.selected{border-color:var(--accent);background:rgba(124,92,255,.15);box-shadow:0 0 16px var(--accent-glow),var(--iso-shadow-sm)}

/* ===== MENU ===== */
.menu-screen{padding:20px 16px;display:flex;flex-direction:column;gap:14px}
.menu-header{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);border:1px solid var(--border);border-bottom:3px solid var(--depth-dark);border-radius:14px;box-shadow:var(--iso-shadow-sm)}
.menu-avatar{font-size:36px;width:50px;height:50px;border-radius:14px;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;background:var(--card2)}
.menu-info{flex:1}
.menu-name{font-size:16px;font-weight:800}
.menu-coins{font-size:13px;color:var(--gold);font-family:'JetBrains Mono',monospace}
.menu-title{text-align:center;font-size:28px;font-weight:800;color:var(--accent);letter-spacing:3px;text-shadow:0 0 20px var(--accent-glow),0 3px 0 var(--depth-dark);margin:10px 0}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.menu-btn{padding:24px 14px;border:2px solid var(--border);border-bottom:5px solid var(--depth-dark);border-radius:16px;background:var(--card);color:var(--text);cursor:pointer;font-family:'Fredoka',sans-serif;font-size:14px;font-weight:700;text-align:center;transition:all .12s;box-shadow:var(--iso-shadow-md);display:flex;flex-direction:column;align-items:center;gap:6px}
.menu-btn:hover{transform:translateY(-3px);box-shadow:var(--iso-shadow-lg);border-color:var(--accent-dim)}
.menu-btn:active{transform:translateY(2px);box-shadow:var(--iso-shadow-sm)}
.menu-btn .btn-icon{font-size:32px}
.menu-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px}
.menu-stat{background:var(--card);border:1px solid var(--border);border-bottom:3px solid var(--depth-dark);border-radius:10px;padding:10px 8px;text-align:center;box-shadow:var(--iso-shadow-sm)}
.menu-stat .sv{font-size:16px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace}
.menu-stat .sl{font-size:9px;color:var(--text-dim);margin-top:2px}

/* ===== LOBBY ===== */
.lobby-screen{padding:20px 16px;display:flex;flex-direction:column;gap:14px}
.lobby-code-box{text-align:center;padding:20px;background:var(--card);border:2px solid var(--accent);border-bottom:5px solid var(--depth-dark);border-radius:16px;box-shadow:var(--iso-shadow-lg)}
.lobby-code-label{font-size:12px;color:var(--text-dim);margin-bottom:4px}
.lobby-code{font-size:42px;font-weight:800;color:var(--accent);letter-spacing:8px;font-family:'JetBrains Mono',monospace;text-shadow:0 0 20px var(--accent-glow)}
.lobby-players-title{font-size:14px;font-weight:700;color:var(--text-dim)}
.lobby-players{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.lobby-player{padding:12px 8px;background:var(--card);border:1px solid var(--border);border-bottom:3px solid var(--depth-dark);border-radius:12px;text-align:center;box-shadow:var(--iso-shadow-sm);animation:playerJoin .3s ease-out}
@keyframes playerJoin{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
.lobby-player .lp-avatar{font-size:28px}
.lobby-player .lp-name{font-size:11px;font-weight:600;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lobby-player.host{border-color:var(--gold);background:rgba(255,215,0,.06)}
.lobby-player.host .lp-name{color:var(--gold)}
.lobby-empty{padding:12px 8px;background:var(--card);border:1px dashed var(--border);border-radius:12px;text-align:center;opacity:.3;font-size:11px;color:var(--text-dim)}
.lobby-btns{display:flex;gap:10px}
.lobby-btns .btn-primary{flex:1}
.btn-danger{width:100%;padding:12px 0;border:2px solid var(--red);border-bottom:4px solid #991a1a;border-radius:12px;background:rgba(255,77,77,.1);color:var(--red);font-size:14px;font-weight:700;font-family:'Fredoka',sans-serif;cursor:pointer;transition:all .1s;box-shadow:var(--iso-shadow-sm);flex:1}
.btn-danger:hover{background:rgba(255,77,77,.2);transform:translateY(-2px)}
.btn-danger:active{transform:translateY(2px);box-shadow:1px 1px 0 var(--depth-dark)}

/* ===== JOIN MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:2px solid var(--accent);border-bottom:5px solid var(--depth-dark);border-radius:20px;padding:28px;max-width:360px;width:100%;text-align:center;animation:modalPop .3s ease-out;box-shadow:var(--iso-shadow-lg)}
@keyframes modalPop{0%{transform:scale(.7) perspective(600px) rotateX(8deg);opacity:0}60%{transform:scale(1.02);opacity:1}100%{transform:scale(1);opacity:1}}
.modal h2{color:var(--accent);font-size:20px;margin-bottom:12px}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer}

/* ===== GAME ===== */
.game-screen{padding:16px;display:flex;flex-direction:column;gap:10px}
.game-header{display:flex;justify-content:space-between;align-items:center}
.game-round{font-size:13px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.game-category{font-size:14px;font-weight:700;color:var(--accent)}
.timer-bar-wrap{width:100%;height:8px;background:var(--card);border-radius:4px;border:1px solid var(--border);border-bottom:2px solid var(--depth-dark);overflow:hidden;box-shadow:var(--iso-shadow-sm)}
.timer-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:4px;transition:width .5s linear}
.timer-bar-fill.urgent{background:linear-gradient(90deg,var(--red),var(--orange))}
.question-card{background:var(--card);border:2px solid var(--border);border-bottom:5px solid var(--depth-dark);border-radius:16px;padding:20px;text-align:center;box-shadow:var(--iso-shadow-md);min-height:100px;display:flex;align-items:center;justify-content:center;position:relative}
.question-text{font-size:18px;font-weight:700;line-height:1.4}
.question-points{position:absolute;top:10px;right:12px;font-size:11px;padding:4px 8px;border-radius:8px;font-weight:700;font-family:'JetBrains Mono',monospace}
.question-points.pts1{background:rgba(124,92,255,.15);color:var(--accent)}
.question-points.pts5{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.answer-btn{padding:16px 12px;border:2px solid transparent;border-bottom:5px solid rgba(0,0,0,.3);border-radius:14px;color:white;font-size:14px;font-weight:700;font-family:'Fredoka',sans-serif;cursor:pointer;transition:all .1s;box-shadow:var(--iso-shadow-sm);text-align:center;min-height:60px;display:flex;align-items:center;justify-content:center;gap:6px}
.answer-btn:nth-child(1){background:var(--ans-blue)}
.answer-btn:nth-child(2){background:var(--ans-red)}
.answer-btn:nth-child(3){background:var(--ans-green)}
.answer-btn:nth-child(4){background:var(--ans-orange)}
.answer-btn:hover:not(.locked):not(.disabled){transform:translateY(-2px);box-shadow:var(--iso-shadow-md)}
.answer-btn:active:not(.locked):not(.disabled){transform:translateY(3px);box-shadow:1px 1px 0 var(--depth-dark)}
.answer-btn.selected{border-color:white;box-shadow:0 0 16px rgba(255,255,255,.3),var(--iso-shadow-sm)}
.answer-btn.correct{border-color:var(--green)!important;box-shadow:0 0 20px rgba(126,217,87,.4)!important}
.answer-btn.wrong{opacity:.4;border-color:transparent!important}
.answer-btn.locked{cursor:default;opacity:.7}
.answer-btn.disabled{cursor:default;opacity:.5}
.timer-text{text-align:center;font-size:28px;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace}

/* ===== CATEGORY PICK ===== */
.category-pick{display:flex;flex-direction:column;gap:12px;align-items:center}
.pick-title{font-size:16px;font-weight:700;text-align:center}
.pick-sub{font-size:13px;color:var(--text-dim);text-align:center}
.category-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
.cat-btn{padding:16px 10px;border:2px solid var(--border);border-bottom:5px solid var(--depth-dark);border-radius:14px;background:var(--card);color:var(--text);cursor:pointer;font-family:'Fredoka',sans-serif;font-size:13px;font-weight:700;transition:all .12s;box-shadow:var(--iso-shadow-sm);display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center}
.cat-btn:hover:not(:disabled){transform:translateY(-3px);box-shadow:var(--iso-shadow-md)}
.cat-btn:active:not(:disabled){transform:translateY(2px);box-shadow:1px 1px 0 var(--depth-dark)}
.cat-btn:disabled{opacity:.3;cursor:default}
.cat-btn .cat-icon{font-size:24px}
.cat-btn .cat-name{font-size:11px}

/* ===== SCOREBOARD (IN-GAME) ===== */
.scoreboard{display:flex;flex-direction:column;gap:4px}
.scoreboard-title{font-size:12px;font-weight:700;color:var(--text-dim);margin-bottom:2px}
.sb-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--card);border:1px solid var(--border);border-bottom:2px solid var(--depth-dark);border-radius:8px;font-size:12px;box-shadow:2px 2px 0 var(--depth-dark)}
.sb-row.me{border-color:var(--accent);background:rgba(124,92,255,.08)}
.sb-rank{font-weight:700;color:var(--text-dim);width:20px;text-align:center}
.sb-avatar{font-size:16px}
.sb-name{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-score{font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace}

/* ===== RESULTS ===== */
.results-screen{padding:20px 16px;display:flex;flex-direction:column;gap:14px;align-items:center}
.results-title{font-size:26px;font-weight:800;color:var(--accent);text-shadow:0 0 20px var(--accent-glow),0 3px 0 var(--depth-dark)}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin:10px 0}
.podium-spot{display:flex;flex-direction:column;align-items:center;text-align:center;padding:12px 10px;background:var(--card);border:2px solid var(--border);border-bottom:5px solid var(--depth-dark);border-radius:14px;box-shadow:var(--iso-shadow-md);min-width:90px}
.podium-spot.first{border-color:var(--gold);background:rgba(255,215,0,.06);transform:translateY(-10px)}
.podium-spot.second{border-color:#c0c0c0}
.podium-spot.third{border-color:#cd7f32}
.podium-medal{font-size:28px}
.podium-avatar{font-size:32px;margin:4px 0}
.podium-name{font-size:12px;font-weight:700;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.podium-score{font-size:16px;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace}
.results-list{width:100%;display:flex;flex-direction:column;gap:6px}
.result-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-bottom:3px solid var(--depth-dark);border-radius:12px;box-shadow:var(--iso-shadow-sm)}
.result-row.me{border-color:var(--accent);background:rgba(124,92,255,.06)}
.rr-rank{font-size:14px;font-weight:800;color:var(--text-dim);width:24px;text-align:center}
.rr-avatar{font-size:22px}
.rr-info{flex:1}
.rr-name{font-size:13px;font-weight:700}
.rr-detail{font-size:10px;color:var(--text-dim)}
.rr-score{text-align:right}
.rr-pts{font-size:16px;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace}
.rr-coins{font-size:10px;color:var(--gold)}
.results-btns{display:flex;gap:10px;width:100%}
.results-btns .btn-primary,.results-btns .btn-danger{flex:1}

/* ===== SHOP ===== */
.shop-tabs{display:flex;gap:2px;margin-bottom:12px}
.shop-tab{flex:1;padding:10px;border:none;border-bottom:3px solid transparent;background:var(--card);color:var(--text-dim);font-family:'Fredoka',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-radius:8px 8px 0 0;transition:all .15s}
.shop-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--card2)}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.shop-item{padding:14px 10px;background:var(--card);border:1px solid var(--border);border-bottom:3px solid var(--depth-dark);border-radius:12px;text-align:center;cursor:pointer;transition:all .12s;box-shadow:var(--iso-shadow-sm)}
.shop-item:hover:not(.owned){transform:translateY(-2px);box-shadow:var(--iso-shadow-md);border-color:var(--accent-dim)}
.shop-item.owned{border-color:var(--green);opacity:.7}
.shop-item .si-icon{font-size:28px;margin-bottom:4px}
.shop-item .si-name{font-size:12px;font-weight:700}
.shop-item .si-price{font-size:11px;color:var(--gold);font-family:'JetBrains Mono',monospace;margin-top:4px}
.shop-item.owned .si-price{color:var(--green)}
.shop-coins{font-size:14px;color:var(--gold);font-family:'JetBrains Mono',monospace;text-align:center;margin-bottom:10px}

/* ===== SOUNDBOARD ===== */
.soundboard-toggle{position:fixed;bottom:16px;right:16px;width:44px;height:44px;border-radius:50%;border:2px solid var(--border);border-bottom:3px solid var(--depth-dark);background:var(--card);color:var(--text);font-size:20px;cursor:pointer;z-index:90;display:flex;align-items:center;justify-content:center;box-shadow:var(--iso-shadow-sm);transition:all .12s}
.soundboard-toggle:hover{transform:translateY(-2px);box-shadow:var(--iso-shadow-md)}
.soundboard-panel{position:fixed;bottom:70px;right:16px;width:200px;background:var(--card);border:1px solid var(--border);border-bottom:3px solid var(--depth-dark);border-radius:14px;padding:10px;z-index:90;box-shadow:var(--iso-shadow-lg);display:none}
.soundboard-panel.open{display:block;animation:modalPop .2s ease-out}
.sb-sound-btn{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--card2);color:var(--text);font-family:'Fredoka',sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:4px;transition:all .1s;text-align:left}
.sb-sound-btn:hover{border-color:var(--accent-dim);background:rgba(124,92,255,.1)}
.sb-sound-btn:disabled{opacity:.4;cursor:default}

/* ===== EMOTE BAR ===== */
.emote-bar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.emote-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);background:var(--card);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;box-shadow:0 2px 0 var(--depth-dark)}
.emote-btn:hover{transform:translateY(-2px);box-shadow:0 4px 0 var(--depth-dark)}
.emote-btn:active{transform:translateY(1px);box-shadow:0 1px 0 var(--depth-dark)}
.emote-float{position:fixed;pointer-events:none;font-size:32px;z-index:200;animation:emoteRise 1.5s ease-out forwards}
@keyframes emoteRise{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.5)}}

/* ===== WAITING TEXT ===== */
.waiting-box{text-align:center;padding:30px;color:var(--text-dim);font-size:14px}
.waiting-box .waiting-icon{font-size:48px;margin-bottom:10px;animation:logoFloat 2s ease-in-out infinite}
.waiting-dots::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

/* ===== CONFETTI ===== */
.confetti{position:fixed;pointer-events:none;z-index:999;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* ===== TOAST ===== */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;background:var(--card);border:2px solid var(--accent);border-bottom:4px solid var(--depth-dark);border-radius:12px;z-index:999;animation:toastSlide 3s ease-in-out forwards;font-size:14px;font-weight:700;color:var(--accent);box-shadow:var(--iso-shadow-md);text-align:center;max-width:90%}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
@keyframes toastSlide{0%{transform:translateX(-50%) translateY(-60px);opacity:0}10%{transform:translateX(-50%) translateY(0);opacity:1}85%{transform:translateX(-50%) translateY(0);opacity:1}100%{transform:translateX(-50%) translateY(-60px);opacity:0}}
</style>
</head>

/* ===== AUTH ===== */
async function hashPw(pw){
const d=new TextEncoder().encode(pw+'banter-quiz-salt-2025');
const h=await crypto.subtle.digest('SHA-256',d);
return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}

async function fetchUser(n){
if(!db)return null;
try{const s=await db.ref('quiz/users/'+sk(n)).once('value');return s.val()}catch(e){return null}}

async function registerUser(n,pw,avatar,displayName){
if(!db)return{ok:false,error:"Can't connect"};
const ex=await fetchUser(n);
if(ex)return{ok:false,error:'Name taken!'};
const h=await hashPw(pw);
try{
await db.ref('quiz/users/'+sk(n)).set({
name:n,passwordHash:h,displayName:displayName||n,avatar:avatar||'😎',
coins:0,purchasedSounds:{},purchasedEmotes:{},
gamesPlayed:0,gamesWon:0,totalCorrect:0,createdAt:Date.now()});
return{ok:true}}catch(e){return{ok:false,error:'Failed: '+e.message}}}

async function loginUser(n,pw){
if(!db)return{ok:false,error:"Can't connect"};
const ex=await fetchUser(n);
if(!ex)return{ok:false,error:'No account with that name.'};
const h=await hashPw(pw);
if(ex.passwordHash!==h)return{ok:false,error:'Wrong password!'};
return{ok:true,data:ex}}

function defUserData(){return{name:'',displayName:'',avatar:'😎',coins:0,purchasedSounds:{},purchasedEmotes:{},gamesPlayed:0,gamesWon:0,totalCorrect:0}}

const phase=gs.phase;
currentScreen='game';

if(phase==='pickCategory'){
const picker=gs.currentPicker;
const isPicker=(picker===sk(player));
const pickerName=players[picker]?players[picker].displayName||players[picker].name:'???';
const used=gs.usedCategories||[];
if(isPicker){
content=`<div class="category-pick">
<div class="pick-title">Your turn to pick!</div>

<div class="category-grid">
${CATEGORIES.map(c=>`<button class="cat-btn" ${used.includes(c.id)?'disabled':''} onclick="pickCategory('${c.id}')" style="border-color:${c.color}"><span class="cat-icon">${c.icon}</span><span class="cat-name">${c.name}</span></button>`).join('')}

else{content=`<div class="waiting-box"><div class="waiting-icon">🤔</div><div>${esc(pickerName)} is picking a category<span class="waiting-dots"></span></div></div>`}
}else if(phase==='showQuestion'){
const qd=gs.currentQuestionData;if(!qd)return;
const myAnswer=gs.playerAnswers&&gs.playerAnswers[sk(player)];
const hasAnswered=myAnswer!==undefined&&myAnswer!==null;
const elapsed=Math.max(0,(Date.now()-qd.startedAt)/1000);
const remaining=Math.max(0,20-elapsed);
const pct=Math.max(0,(remaining/20)*100);
const cat=CATEGORIES.find(c=>c.id===gs.selectedCategory);

<div class="answers-grid">${qd.answers.map((a,i)=>`<button class="answer-btn ${hasAnswered?(myAnswer.answerIndex===i?'selected':'locked'):''}${hasAnswered?'disabled':''}" onclick="submitAnswer(${i})">${esc(a)}</button>`).join('')}</div>
${hasAnswered?'<div style="text-align:center;color:var(--text-dim);font-size:12px;margin-top:4px">Answer locked in!</div>':''}`;
startTimerTick()}
else if(phase==='showAnswer'){
const qd=gs.currentQuestionData;if(!qd)return;
const myAnswer=gs.playerAnswers&&gs.playerAnswers[sk(player)];
const cat=CATEGORIES.find(c=>c.id===gs.selectedCategory);
content=`<div class="game-header"><span class="game-round">Round ${(gs.currentRound||0)+1} Q${(gs.currentQuestion||0)+1}/5</span><span class="game-category">${cat?cat.icon+' '+cat.name:''}</span></div>
<div class="question-card"><span class="question-points ${qd.points===5?'pts5':'pts1'}">${qd.points}pt${qd.points>1?'s':''}</span><div class="question-text">${esc(qd.question)}</div></div>
<div class="answers-grid">${qd.answers.map((a,i)=>`<button class="answer-btn ${i===qd.correctIndex?'correct':'wrong'} locked">${esc(a)}${i===qd.correctIndex?' ✓':''}</button>`).join('')}</div>
<div style="text-align:center;margin-top:6px;font-size:13px">${myAnswer&&myAnswer.answerIndex===qd.correctIndex?`<span style="color:var(--green)">Correct! +${qd.points}</span>`:`<span style="color:var(--red)">Wrong!</span>`}</div>`}
else if(phase==='roundEnd'){
content=`<div class="waiting-box"><div class="waiting-icon">📊</div><div>Round ${(gs.currentRound||0)+1} complete!</div><div style="font-size:12px;color:var(--text-dim);margin-top:4px">Next round starting<span class="waiting-dots"></span></div></div>`}

function renderEmoteBar(){
const owned=userData&&userData.purchasedEmotes?Object.keys(userData.purchasedEmotes):[];

function startTimerTick(){
if(gameTimer)clearInterval(gameTimer);
gameTimer=setInterval(()=>{
const gs=lobbyData&&lobbyData.gameState;
if(!gs||gs.phase!=='showQuestion'){clearInterval(gameTimer);gameTimer=null;return}
const qd=gs.currentQuestionData;if(!qd)return;
const elapsed=(Date.now()-qd.startedAt)/1000;
const remaining=Math.max(0,20-elapsed);
const pct=Math.max(0,(remaining/20)*100);
const timerEl=document.querySelector('.timer-text');
const barEl=document.querySelector('.timer-bar-fill');
if(timerEl)timerEl.textContent=Math.ceil(remaining)+'s';
if(barEl){barEl.style.width=pct+'%';if(remaining<5)barEl.classList.add('urgent');else barEl.classList.remove('urgent')}
if(remaining<=0&&isHost){clearInterval(gameTimer);gameTimer=null;hostAdvanceFromQuestion()}
},500)}

async function pickCategory(catId){
if(!lobbyCode||!lobbyData)return;
const gs=lobbyData.gameState;
if(!gs||gs.currentPicker!==sk(player))return;
const used=gs.usedCategories||[];
used.push(catId);
await db.ref('quiz/lobbies/'+lobbyCode+'/gameState').update({selectedCategory:catId,usedCategories:used});
if(isHost)hostShowNextQuestion()}

async function submitAnswer(idx){
if(!lobbyCode)return;
await db.ref('quiz/lobbies/'+lobbyCode+'/gameState/playerAnswers/'+sk(player)).set({answerIndex:idx,answeredAt:Date.now()});
const gs=lobbyData&&lobbyData.gameState;
if(!gs)return;
const players=lobbyData.players?Object.keys(lobbyData.players).filter(k=>lobbyData.players[k].connected!==false):[];
const answers=gs.playerAnswers||{};
answers[sk(player)]={answerIndex:idx,answeredAt:Date.now()};
const answered=players.filter(k=>answers[k]!==undefined&&answers[k]!==null).length;
if(answered>=players.length&&isHost)hostAdvanceFromQuestion()}

/* ===== HOST GAME CONTROL ===== */
async function hostShowNextQuestion(){
if(!isHost||!lobbyCode)return;
const gs=lobbyData.gameState;
const cat=gs.selectedCategory;
const pool=QUESTIONS[cat]||[];
const used=gs.usedQuestionIds||[];
const available=pool.filter(q=>!used.includes(q.id));
if(available.length===0)return;
const q=available[Math.floor(Math.random()*available.length)];
const shuffled=shuffleAnswers(q);
used.push(q.id);
await db.ref('quiz/lobbies/'+lobbyCode+'/gameState').update({
phase:'showQuestion',
currentQuestionData:{question:q.q,answers:shuffled.answers,correctIndex:shuffled.correctIndex,points:q.points,startedAt:Date.now()},
playerAnswers:null,usedQuestionIds:used})}

function shuffleAnswers(q){
const indices=[0,1,2,3];
for(let i=indices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[indices[i],indices[j]]=[indices[j],indices[i]]}
const newAnswers=indices.map(i=>q.answers[i]);
const newCorrect=indices.indexOf(q.correct);
return{answers:newAnswers,correctIndex:newCorrect}}

async function hostAdvanceFromQuestion(){
if(!isHost||!lobbyCode)return;
const gs=lobbyData.gameState;if(!gs)return;
const qd=gs.currentQuestionData;if(!qd)return;
// Score answers
const answers=gs.playerAnswers||{};
const players=lobbyData.players||{};
const updates={};
Object.entries(answers).forEach(([k,v])=>{
if(v&&v.answerIndex===qd.correctIndex){
const cur=players[k]?players[k].score||0:0;
updates['players/'+k+'/score']=cur+qd.points}});
updates['gameState/phase']='showAnswer';
await db.ref('quiz/lobbies/'+lobbyCode).update(updates);
setTimeout(()=>hostAfterAnswer(),3000)}

async function hostAfterAnswer(){
if(!isHost||!lobbyCode)return;
const gs=lobbyData.gameState;if(!gs)return;
const qNum=(gs.currentQuestion||0)+1;
const qPerRound=gs.questionsPerRound||5;
if(qNum<qPerRound){
await db.ref('quiz/lobbies/'+lobbyCode+'/gameState').update({currentQuestion:qNum,phase:'showQuestion',playerAnswers:null});
hostShowNextQuestion()}
else{
const roundNum=(gs.currentRound||0)+1;
const totalRounds=gs.pickerOrder?Math.min(gs.pickerOrder.length,CATEGORIES.length):CATEGORIES.length;
if(roundNum>=totalRounds){hostEndGame()}
else{
await db.ref('quiz/lobbies/'+lobbyCode+'/gameState').update({phase:'roundEnd',currentRound:roundNum,currentQuestion:0});
const order=gs.pickerOrder||[];
const nextPicker=order[roundNum%order.length];
setTimeout(async()=>{
await db.ref('quiz/lobbies/'+lobbyCode+'/gameState').update({phase:'pickCategory',currentPicker:nextPicker,selectedCategory:'',playerAnswers:null})},4000)}}}

async function hostEndGame(){
if(!isHost||!lobbyCode)return;
const players=lobbyData.players||{};
const sorted=Object.entries(players).filter(([k,v])=>v.connected!==false).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
const results={};
sorted.forEach(([k,v],i)=>{
let coinsEarned=0;
const correct=v.score||0;
coinsEarned=correct*2;
if(i===0)coinsEarned+=10;
else if(i===1)coinsEarned+=5;
else if(i===2)coinsEarned+=3;
results[k]={finalScore:v.score||0,rank:i+1,coinsEarned,name:v.name,displayName:v.displayName||v.name,avatar:v.avatar||'😎'};
// Update user coins and stats
db.ref('quiz/users/'+k+'/coins').transaction(c=>(Number(c)||0)+coinsEarned);
db.ref('quiz/users/'+k+'/gamesPlayed').transaction(c=>(Number(c)||0)+1);
if(i===0)db.ref('quiz/users/'+k+'/gamesWon').transaction(c=>(Number(c)||0)+1);
db.ref('quiz/users/'+k+'/totalCorrect').transaction(c=>(Number(c)||0)+(v.score||0))});
await db.ref('quiz/lobbies/'+lobbyCode+'/gameState').update({phase:'gameOver',results});
await db.ref('quiz/lobbies/'+lobbyCode).update({status:'finished'})}

/* ===== RESULTS ===== */
function renderResults(){
const gs=lobbyData&&lobbyData.gameState;
const results=gs&&gs.results;
if(!results){showScreen('menu');return}
currentScreen='results';
const sorted=Object.entries(results).sort((a,b)=>a[1].rank-b[1].rank);
const myResult=results[sk(player)];
// Refresh user data
refreshUserData();
// Confetti
spawnConfetti();

let podiumHTML='';
if(sorted.length>=1){
const spots=sorted.slice(0,3);
const order=spots.length>=3?[spots[1],spots[0],spots[2]]:spots.length>=2?[spots[1],spots[0]]:spots;
const medals=['🥇','🥈','🥉'];
const classes=['second','first','third'];
podiumHTML=`<div class="podium">${order.map((s,i)=>{
const idx=spots.indexOf(s);
return`<div class="podium-spot ${classes[i]||''}"><div class="podium-medal">${medals[idx]||''}</div><div class="podium-avatar">${s[1].avatar}</div><div class="podium-name">${esc(s[1].displayName||s[1].name)}</div><div class="podium-score">${s[1].finalScore}pts</div></div>`}).join('')}</div>`}

document.getElementById('app').innerHTML=`<div class="results-screen">
<div class="results-title">Game Over!</div>
${podiumHTML}
<div class="results-list">${sorted.map(([k,v])=>`<div class="result-row ${k===sk(player)?'me':''}">
<span class="rr-rank">#${v.rank}</span><span class="rr-avatar">${v.avatar}</span>
<div class="rr-info"><div class="rr-name">${esc(v.displayName||v.name)}</div><div class="rr-detail">${v.finalScore} points</div></div>
<div class="rr-score"><div class="rr-pts">${v.finalScore}</div><div class="rr-coins">+${v.coinsEarned} 🪙</div></div>
</div>`).join('')}</div>
${myResult?`<div style="text-align:center;font-size:14px;color:var(--gold)">You earned ${myResult.coinsEarned} coins!</div>`:''}
<div class="results-btns">
${isHost?`<button class="btn-primary" onclick="playAgain()">Play Again</button>`:''}
<button class="btn-danger" onclick="backToMenu()">Main Menu</button>
</div></div>`}

async function playAgain(){
if(!isHost||!lobbyCode)return;
const players=lobbyData.players||{};
const updates={status:'waiting','gameState':null};
Object.keys(players).forEach(k=>{updates['players/'+k+'/score']=0});
await db.ref('quiz/lobbies/'+lobbyCode).update(updates);
showScreen('lobby',{code:lobbyCode})}

function backToMenu(){
if(lobbyCode&&!isHost){db.ref('quiz/lobbies/'+lobbyCode+'/players/'+sk(player)).remove()}
lobbyCode=null;lobbyData=null;isHost=false;showScreen('menu')}

/* ===== SHOP ===== */
let shopTab='sounds';
function showShop(){
const overlay=document.createElement('div');
overlay.className='modal-overlay';overlay.id='shopModal';
overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};
overlay.innerHTML=`<div class="modal" style="max-width:420px"><h2>🛒 Shop</h2><div id="shopContent"></div>
<button class="btn-danger" style="margin-top:12px" onclick="document.getElementById('shopModal').remove()">Close</button></div>`;
document.body.appendChild(overlay);
renderShopContent()}

function renderShopContent(){
const u=userData||defUserData();
const el=document.getElementById('shopContent');if(!el)return;
const ownedSounds=u.purchasedSounds||{};
const ownedEmotes=u.purchasedEmotes||{};
el.innerHTML=`<div class="shop-coins">🪙 ${fmt(u.coins||0)} coins</div>
<div class="shop-tabs"><button class="shop-tab ${shopTab==='sounds'?'active':''}" onclick="shopTab='sounds';renderShopContent()">🔊 Sounds</button><button class="shop-tab ${shopTab==='emotes'?'active':''}" onclick="shopTab='emotes';renderShopContent()">😂 Emotes</button></div>
<div class="shop-grid">${(shopTab==='sounds'?SHOP_SOUNDS:SHOP_EMOTES).map(item=>{
const owned=shopTab==='sounds'?ownedSounds[item.id]:ownedEmotes[item.id];
return`<div class="shop-item ${owned?'owned':''}" onclick="${owned?'':`buyItem('${shopTab}','${item.id}',${item.price})`}">
<div class="si-icon">${item.emoji}</div><div class="si-name">${item.name}</div>
<div class="si-price">${owned?'Owned':'🪙 '+item.price}</div></div>`}).join('')}</div>`}

async function buyItem(type,id,price){
if(!player||!db)return;
const u=userData||defUserData();
if((u.coins||0)<price){showToast('Not enough coins!','error');return}
const key=type==='sounds'?'purchasedSounds':'purchasedEmotes';
try{
await db.ref('quiz/users/'+sk(player)+'/coins').transaction(c=>{const v=Number(c)||0;return v>=price?v-price:v});
await db.ref('quiz/users/'+sk(player)+'/'+key+'/'+id).set(true);
userData.coins=(userData.coins||0)-price;
if(!userData[key])userData[key]={};
userData[key][id]=true;
renderShopContent();showToast('Purchased!','success');
}catch(e){showToast('Purchase failed','error')}}

/* ===== PROFILE ===== */
function showProfile(){
const u=userData||defUserData();
const overlay=document.createElement('div');
overlay.className='modal-overlay';overlay.id='profileModal';
overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};
overlay.innerHTML=`<div class="modal" style="max-width:400px">
<h2>👤 Profile</h2>
<div style="font-size:48px;margin:10px 0">${u.avatar||'😎'}</div>
<label class="field-label">Display Name</label>
<input class="field-input" id="profName" value="${esc(u.displayName||u.name||player)}" maxlength="20">
<label class="field-label">Avatar</label>
<div class="avatar-grid" id="profAvatarGrid">${AVATARS.map(a=>`<div class="avatar-opt ${a===(u.avatar||'😎')?'selected':''}" data-av="${a}" onclick="pickProfileAvatar(this)">${a}</div>`).join('')}</div>
<button class="btn-primary" onclick="saveProfile()">Save</button>
<button class="btn-danger" style="margin-top:8px" onclick="document.getElementById('profileModal').remove()">Cancel</button>
</div>`;
document.body.appendChild(overlay)}

let profileAvatar=null;
function pickProfileAvatar(el){
document.querySelectorAll('#profAvatarGrid .avatar-opt').forEach(e=>e.classList.remove('selected'));
el.classList.add('selected');profileAvatar=el.dataset.av}

async function saveProfile(){
const dn=(document.getElementById('profName')||{}).value||player;
const av=profileAvatar||userData.avatar||'😎';
await db.ref('quiz/users/'+sk(player)).update({displayName:dn.trim(),avatar:av});
userData.displayName=dn.trim();userData.avatar=av;
const m=document.getElementById('profileModal');if(m)m.remove();
renderMenu();showToast('Profile saved!','success')}

/* ===== SOUNDBOARD ===== */
function setupSoundboard(){
if(currentScreen!=='game'||!lobbyCode)return;
const owned=userData&&userData.purchasedSounds?Object.keys(userData.purchasedSounds):[];
if(owned.length===0)return;
if(!document.getElementById('sbToggle')){
const toggle=document.createElement('button');
toggle.className='soundboard-toggle';toggle.id='sbToggle';toggle.textContent='🔊';
toggle.onclick=()=>{soundboardOpen=!soundboardOpen;const p=document.getElementById('sbPanel');if(p)p.classList.toggle('open',soundboardOpen)};
document.body.appendChild(toggle);
const panel=document.createElement('div');
panel.className='soundboard-panel';panel.id='sbPanel';
panel.innerHTML=owned.map(id=>{const s=SHOP_SOUNDS.find(x=>x.id===id);
return s?`<button class="sb-sound-btn" onclick="playSound('${id}')">${s.emoji} ${s.name}</button>`:''}).join('');
document.body.appendChild(panel)}
if(!soundboardRef){
soundboardRef=db.ref('quiz/lobbies/'+lobbyCode+'/soundboard');
soundboardRef.on('value',snap=>{
const v=snap.val();if(!v)return;
if(Date.now()-v.timestamp<2000)playSoundEffect(v.soundId)})}}

async function playSound(id){
if(Date.now()-lastSoundAt<5000){showToast('Wait before playing another sound!','error');return}
lastSoundAt=Date.now();
await db.ref('quiz/lobbies/'+lobbyCode+'/soundboard').set({playedBy:player,soundId:id,timestamp:Date.now()})}

function playSoundEffect(id){
try{
const ctx=new(window.AudioContext||window.webkitAudioContext)();
const osc=ctx.createOscillator();const gain=ctx.createGain();
osc.connect(gain);gain.connect(ctx.destination);
gain.gain.value=0.15;
const freqs={airhorn:800,bruh:200,sadviolin:440,wow:600,oof:150,rizz:500};
osc.frequency.value=freqs[id]||440;
osc.type=id==='sadviolin'?'sine':id==='bruh'?'sawtooth':'square';
osc.start();gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
osc.stop(ctx.currentTime+0.5)}catch(e){}}

/* ===== EMOTES ===== */
async function sendEmote(emoji){
if(!lobbyCode)return;
if(Date.now()-lastEmoteAt<3000)return;
lastEmoteAt=Date.now();
await db.ref('quiz/lobbies/'+lobbyCode+'/emotes').push({playedBy:player,emoji,timestamp:Date.now()});
showFloatingEmote(emoji)}

function showFloatingEmote(emoji){
const el=document.createElement('div');
el.className='emote-float';el.textContent=emoji;
el.style.left=Math.random()*60+20+'%';el.style.bottom='120px';
document.body.appendChild(el);setTimeout(()=>el.remove(),1500)}

/* ===== TOAST ===== */
function showToast(msg,type=''){
const old=document.querySelector('.toast');if(old)old.remove();
const t=document.createElement('div');t.className='toast'+(type?' '+type:'');
t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3200)}

/* ===== CONFETTI ===== */
function spawnConfetti(){
const colors=['#7c5cff','#ff4d4d','#7ed957','#ffb347','#ffd700','#3b82f6','#ef4444'];
for(let i=0;i<40;i++){
const c=document.createElement('div');c.className='confetti';
c.style.cssText=`left:${Math.random()*100}%;top:-10px;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s`;
document.body.appendChild(c);setTimeout(()=>c.remove(),4000)}}

/* ===== INIT ===== */
function init(){
initFB();
try{
const ses=JSON.parse(localStorage.getItem('quizSession'));
if(ses&&ses.name&&ses.pwHash){autoLogin(ses.name,ses.pwHash);return}}catch(e){}
showScreen('auth')}

window.addEventListener('beforeunload',()=>{
if(lobbyCode&&player&&db){
try{db.ref('quiz/lobbies/'+lobbyCode+'/players/'+sk(player)).update({connected:false})}catch(e){}}});

init();
</script>
</body>
